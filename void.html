<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VOID</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            cursor: crosshair;
        }

        canvas {
            display: block;
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .ui {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            pointer-events: auto;
        }

        .back-link:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .depth-meter {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        .footer {
            text-align: center;
            opacity: 0.2;
            font-size: 0.7rem;
            letter-spacing: 4px;
        }

        .hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 1s;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="header">
            <a href="index.html" class="back-link">← Escape the Dark</a>
            <div class="depth-meter">Tier: <span id="depth-tier">Surface</span></div>
        </div>
        <div class="footer">CLICK TO WARP · SCROLL TO DESCEND · ESCAPE IS OPTIONAL</div>
    </div>

    <div class="hint" id="hint">Welcome to Nothing</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const depthTierEl = document.getElementById('depth-tier');
        const hintEl = document.getElementById('hint');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Configuration ---
        const MESSAGES = [
            "You were not invited.",
            "The void remembers your cursor.",
            "Distance is a construct.",
            "Stop fighting the fall.",
            "Everything shatters eventually.",
            "Why do you keep looking?",
            "The silence is loud here.",
            "A place between data.",
            "Hello? Can you hear the code?",
            "You are falling through a dream."
        ];

        let msgIdx = 0;
        let particles = [];
        let fragments = [];
        let singularities = [];
        let depth = 0;
        let targetDepth = 0;

        class Particle {
            constructor(x, y, isStar = false) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = isStar ? -(1 + Math.random() * 3) : -(0.2 + Math.random() * 0.8);
                this.size = isStar ? Math.random() * 1.5 : Math.random() * 3 + 1;
                this.color = isStar ? `rgba(255,255,255,${0.1 + Math.random() * 0.4})` : `rgba(160,140,255,${0.1 + Math.random() * 0.3})`;
                this.isStar = isStar;
                this.mass = this.size;
            }

            update() {
                // Gravity from singularities
                singularities.forEach(s => {
                    const dx = s.x - this.x;
                    const dy = s.y - this.y;
                    const dSq = dx * dx + dy * dy;
                    const dist = Math.sqrt(dSq);
                    if (dist < s.range) {
                        const force = (s.strength * this.mass) / (dSq + 100);
                        this.vx += (dx / dist) * force;
                        this.vy += (dy / dist) * force;
                        this.vx *= 0.98; // Friction in event horizon
                        this.vy *= 0.98;
                    }
                });

                this.x += this.vx;
                this.y += this.vy;

                // Infinite wrap/loop
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class TextFragment {
            constructor(text, x, y) {
                this.text = text;
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = -(0.5 + Math.random() * 0.5);
                this.alpha = 0;
                this.targetAlpha = 0.5;
                this.shattered = false;
                this.pieces = [];
                this.life = 1;
            }

            shatter() {
                if (this.shattered) return;
                this.shattered = true;
                const words = this.text.split(' ');
                words.forEach((w, i) => {
                    this.pieces.push({
                        text: w,
                        x: this.x + (i * 20),
                        y: this.y,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        rot: Math.random() * Math.PI * 2,
                        vr: (Math.random() - 0.5) * 0.1
                    });
                });
            }

            update() {
                if (this.shattered) {
                    this.life -= 0.005;
                    this.pieces.forEach(p => {
                        singularities.forEach(s => {
                            const dx = s.x - p.x;
                            const dy = s.y - p.y;
                            const dSq = dx * dx + dy * dy;
                            const dist = Math.sqrt(dSq);
                            if (dist < s.range) {
                                const force = (s.strength * 2) / (dSq + 100);
                                p.vx += (dx / dist) * force;
                                p.vy += (dy / dist) * force;
                            }
                        });
                        p.x += p.vx;
                        p.y += p.vy;
                        p.rot += p.vr;
                        p.vx *= 0.99;
                        p.vy *= 0.99;
                    });
                } else {
                    this.alpha += (this.targetAlpha - this.alpha) * 0.05;
                    this.y += this.vy;

                    singularities.forEach(s => {
                        const dx = s.x - this.x;
                        const dy = s.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < s.range * 0.5) this.shatter();
                    });

                    if (this.y < -100) this.life = 0;
                }
            }

            draw() {
                if (this.shattered) {
                    ctx.font = '300 14px Space Grotesk';
                    this.pieces.forEach(p => {
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.fillStyle = `rgba(255,255,255,${this.life * 0.3})`;
                        ctx.fillText(p.text, 0, 0);
                        ctx.restore();
                    });
                } else {
                    ctx.font = '300 18px Space Grotesk';
                    ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
                    ctx.textAlign = 'center';
                    ctx.fillText(this.text, this.x, this.y);
                }
            }
        }

        class Singularity {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.range = 300;
                this.strength = 15;
                this.life = 200;
                this.pulse = 0;
            }

            update() {
                this.life--;
                this.pulse += 0.1;
                this.range = 300 + Math.sin(this.pulse) * 50;
            }

            draw() {
                const alpha = Math.min(1, this.life / 50);
                const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.range * 0.5);
                grd.addColorStop(0, `rgba(0,0,0,${alpha})`);
                grd.addColorStop(0.2, `rgba(20,0,40,${alpha * 0.8})`);
                grd.addColorStop(0.5, `rgba(100,0,255,${alpha * 0.2})`);
                grd.addColorStop(1, 'transparent');

                ctx.fillStyle = grd;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
                ctx.fill();

                // Core event horizon
                ctx.beginPath();
                ctx.arc(this.x, this.y, 5 + Math.sin(this.pulse) * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha * 0.5})`;
                ctx.fill();
            }
        }

        // --- Initialization ---
        for (let i = 0; i < 150; i++) particles.push(new Particle(Math.random() * width, Math.random() * height, true));
        for (let i = 0; i < 50; i++) particles.push(new Particle(Math.random() * width, Math.random() * height, false));

        function spawnMessage() {
            fragments.push(new TextFragment(MESSAGES[msgIdx % MESSAGES.length], width / 2, height + 50));
            msgIdx++;
            setTimeout(spawnMessage, 6000 + Math.random() * 4000);
        }
        setTimeout(spawnMessage, 2000);

        // --- Interaction ---
        window.addEventListener('mousedown', e => {
            singularities.push(new Singularity(e.clientX, e.clientY));

            // Check for shatter on click
            fragments.forEach(f => {
                const dist = Math.sqrt((e.clientX - f.x) ** 2 + (e.clientY - f.y) ** 2);
                if (dist < 100) f.shatter();
            });
        });

        window.addEventListener('wheel', e => {
            targetDepth += e.deltaY * 0.1;
            if (targetDepth < 0) targetDepth = 0;

            const tier = Math.floor(targetDepth / 500);
            const tiers = ["Surface", "Abyss", "The Deep", "Singularity Zone", "Data Horizon", "Eternal Fall"];
            depthTierEl.textContent = tiers[Math.min(tier, tiers.length - 1)];

            if (tier > 0) hintEl.style.opacity = '0';
        });

        // --- Loop ---
        function loop() {
            // Background clearing with "persistence" effect
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0, 0, width, height);

            depth += (targetDepth - depth) * 0.05;

            // Update & Draw Singularities
            singularities = singularities.filter(s => s.life > 0);
            singularities.forEach(s => {
                s.update();
                s.draw();
            });

            // Update & Draw Particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Update & Draw Fragments
            fragments = fragments.filter(f => f.life > 0);
            fragments.forEach(f => {
                f.update();
                f.draw();
            });

            // Tier shifting visual offsets (parallax by depth)
            ctx.save();
            ctx.translate(0, -depth % height);
            // (Could add more vertical transition elements here)
            ctx.restore();

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>

</html>
