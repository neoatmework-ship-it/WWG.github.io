<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%A6%85%3C%2Ftext%3E%3C%2Fsvg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Neon 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent: #22d3ee;
            --accent2: #f472b6;
            --danger: #ef4444;
            --text: #f0eef5;
            --font: 'Space Grotesk', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 800px;
            background: radial-gradient(circle at center, #11111a 0%, #050508 100%);
            box-shadow: 0 0 50px rgba(34, 211, 238, 0.1);
            overflow: hidden;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #score-display {
            position: absolute;
            top: 40px;
            font-size: 4rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .panel {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            pointer-events: auto;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .panel.visible {
            transform: scale(1);
            opacity: 1;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            color: #8888a0;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .btn {
            background: rgba(34, 211, 238, 0.15);
            color: var(--accent);
            border: 1px solid rgba(34, 211, 238, 0.3);
            padding: 14px 32px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: rgba(34, 211, 238, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(34, 211, 238, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .stat {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translate(0, 0) rotate(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translate(-5px, 5px) rotate(-1deg);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translate(5px, -5px) rotate(1deg);
            }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }
    </style>
</head>

<body>

<!-- WWG Back Button -->
<style>
.wwg-back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 44px;
    height: 44px;
    background: rgba(10, 10, 15, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a78bfa;
    z-index: 99999;
    transition: all 0.3s ease;
    text-decoration: none;

.wwg-back-btn:hover {

    box-shadow: 0 0 15px rgba(167, 139, 250, 0.3);

</style>
<a href="index.html" class="wwg-back-btn" title="Back to Gallery">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>

    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div id="score-display">0</div>

        <div class="ui-layer">
            <!-- Start menu -->
            <div id="start-panel" class="panel visible">
                <h1>FLAPPY NEON</h1>
                <p>Press Space or Click to jump</p>
                <button class="btn" id="btn-start">Play Now</button>
            </div>

            <!-- Game Over menu -->
            <div id="gameover-panel" class="panel">
                <h1
                    style="background: linear-gradient(135deg, #ef4444, #f97316); -webkit-background-clip: text; background-clip: text;">
                    SYSTEM
                    FAILURE</h1>
                <div class="stats-grid">
                    <div class="stat">
                        <div class="stat-val" id="final-score">0</div>
                        <div class="stat-label">Score</div>
                    </div>
                    <div class="stat">
                        <div class="stat-val" id="best-score" style="color: var(--accent2);">0</div>
                        <div class="stat-label">Best</div>
                    </div>
                </div>
                <button class="btn" id="btn-restart">Try Again</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score-display');
        const startPanel = document.getElementById('start-panel');
        const gameoverPanel = document.getElementById('gameover-panel');

        let width, height;
        let lastTime = 0;
        let gameState = 'START'; // START, PLAYING, GAMEOVER

        // Game config
        const gravity = 1200; // pixels per second squared
        const jumpForce = -450; // pixels per second
        const playerSize = 24;
        const pipeWidth = 60;
        const pipeGap = 160;
        const speedMultiplier = 1.05;

        // Game state
        let player = { x: 0, y: 0, vy: 0, color: '#f472b6' };
        let pipes = [];
        let particles = [];
        let score = 0;
        let bestScore = localStorage.getItem('flappyNeonBest') || 0;
        let gameSpeed = 250; // pixels per second
        let distanceSinceLastPipe = 0;

        function resize() {
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
            // High DPI
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        function resetGame() {
            player.x = width * 0.3;
            player.y = height / 2;
            player.vy = 0;
            pipes = [];
            particles = [];
            score = 0;
            gameSpeed = 250;
            distanceSinceLastPipe = 300; // spawn pipe soon
            scoreDisplay.textContent = '0';
            scoreDisplay.style.opacity = '1';

            startPanel.classList.remove('visible');
            gameoverPanel.classList.remove('visible');
            container.classList.remove('shake');

            gameState = 'PLAYING';
            lastTime = performance.now();
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            container.classList.add('shake');
            scoreDisplay.style.opacity = '0';

            // Shatter player
            for (let i = 0; i < 30; i++) {
                createParticle(player.x, player.y, player.color, true);
            }

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('flappyNeonBest', bestScore);
            }

            document.getElementById('final-score').textContent = score;
            document.getElementById('best-score').textContent = bestScore;

            setTimeout(() => {
                gameoverPanel.classList.add('visible');
            }, 500);
        }

        function jump() {
            if (gameState === 'START' || gameState === 'GAMEOVER') {
                if (gameoverPanel.classList.contains('visible') || startPanel.classList.contains('visible')) {
                    resetGame();
                }
                return;
            }
            player.vy = jumpForce;

            // Jump particles
            for (let i = 0; i < 5; i++) {
                createParticle(player.x, player.y + playerSize / 2, '#fff');
            }
        }

        function createPipe() {
            const minH = 50;
            const maxH = height - pipeGap - minH;
            const topHeight = Math.random() * (maxH - minH) + minH;

            pipes.push({
                x: width + 50,
                topHeight: topHeight,
                passed: false
            });
        }

        function createParticle(x, y, color, explosion = false) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * (explosion ? 500 : 100) - (explosion ? 0 : gameSpeed),
                vy: (Math.random() - 0.5) * (explosion ? 500 : 100),
                life: 1.0,
                decay: Math.random() * 2 + 1,
                color: color,
                size: Math.random() * 4 + 2
            });
        }

        // Input
        window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
        container.addEventListener('mousedown', jump);
        container.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

        function update(dt) {
            if (gameState !== 'PLAYING') return;

            // Player physics
            player.vy += gravity * dt;
            player.y += player.vy * dt;

            // Trail
            if (Math.random() > 0.5) {
                createParticle(player.x - playerSize / 2, player.y + (Math.random() - 0.5) * playerSize, player.color);
            }

            // Floor/Ceiling collision
            if (player.y - playerSize / 2 < 0 || player.y + playerSize / 2 > height) {
                gameOver();
            }

            // Pipes
            distanceSinceLastPipe += gameSpeed * dt;
            const pipeSpacing = Math.max(250, 400 - (score * 5)); // gets tighter

            if (distanceSinceLastPipe > pipeSpacing) {
                createPipe();
                distanceSinceLastPipe = 0;
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                let p = pipes[i];
                p.x -= gameSpeed * dt;

                // Collision
                const left = p.x - pipeWidth / 2;
                const right = p.x + pipeWidth / 2;
                const pxLeft = player.x - playerSize / 2 + 4; // small hitbox leniency
                const pxRight = player.x + playerSize / 2 - 4;
                const pyTop = player.y - playerSize / 2 + 4;
                const pyBottom = player.y + playerSize / 2 - 4;

                if (pxRight > left && pxLeft < right) {
                    if (pyTop < p.topHeight || pyBottom > p.topHeight + pipeGap) {
                        gameOver();
                    }
                }

                // Scoring
                if (!p.passed && p.x < player.x) {
                    p.passed = true;
                    score++;
                    scoreDisplay.textContent = score;
                    scoreDisplay.style.transform = 'scale(1.5)';
                    setTimeout(() => scoreDisplay.style.transform = 'scale(1)', 100);

                    if (score % 5 === 0) {
                        gameSpeed *= speedMultiplier; // speed up every 5 points
                        player.color = score % 10 === 0 ? '#22d3ee' : '#f472b6'; // toggle color
                    }
                }

                if (p.x < -pipeWidth) {
                    pipes.splice(i, 1);
                }
            }
        }

        function drawPipe(x, y, w, h, isTop) {
            ctx.fillStyle = '#11111a';
            ctx.strokeStyle = '#22d3ee';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#22d3ee';
            ctx.shadowBlur = 15;

            ctx.beginPath();
            ctx.rect(x - w / 2, y, w, h);
            ctx.fill();
            ctx.stroke();

            // Pipe cap
            const capH = 20;
            const capW = w + 10;
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(x - capW / 2, isTop ? y + h - capH : y, capW, capH);
            ctx.strokeRect(x - capW / 2, isTop ? y + h - capH : y, capW, capH);

            ctx.shadowBlur = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Draw pipes
            for (let p of pipes) {
                drawPipe(p.x, 0, pipeWidth, p.topHeight, true);
                drawPipe(p.x, p.topHeight + pipeGap, pipeWidth, height - (p.topHeight + pipeGap), false);
            }

            // Draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * 0.016;
                p.y += p.vy * 0.016;
                p.life -= p.decay * 0.016;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Draw player
            if (gameState === 'PLAYING') {
                ctx.save();
                ctx.translate(player.x, player.y);
                // Rotate based on velocity
                let rot = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (player.vy * 0.002)));
                ctx.rotate(rot);

                ctx.shadowColor = player.color;
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = player.color;
                ctx.lineWidth = 3;

                ctx.beginPath();
                ctx.roundRect(-playerSize / 2, -playerSize / 2, playerSize, playerSize, 4);
                ctx.fill();
                ctx.stroke();

                // Eye/core inside
                ctx.fillStyle = player.color;
                ctx.shadowBlur = 0;
                ctx.fillRect(playerSize / 4 - 2, -4, 4, 8);

                ctx.restore();
            }

            // Decorate background - subtle grid
            ctx.strokeStyle = 'rgba(255,255,255,0.02)';
            ctx.lineWidth = 1;
            const gridOffset = (performance.now() * gameSpeed / 1000 * 0.3) % 40;
            ctx.beginPath();
            for (let x = 0; x < width; x += 40) { ctx.moveTo(x - gridOffset, 0); ctx.lineTo(x - gridOffset, height); }
            for (let y = 0; y < height; y += 40) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();
        }

        function loop(time) {
            let dt = (time - lastTime) / 1000;
            if (dt > 0.1) dt = 0.016; // Prevent huge jumps if tab was inactive
            lastTime = time;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        // Start button hits
        document.getElementById('btn-start').addEventListener('click', resetGame);
        document.getElementById('btn-restart').addEventListener('click', resetGame);

        requestAnimationFrame(loop);
    </script>
</body>

</html>
