<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator | WWG</title>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎨%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            font-family: 'Space Grotesk', sans-serif;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .topbar a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .topbar a:hover {
            color: white;
        }

        .topbar h1 {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(90deg, #a78bfa, #f472b6, #22d3ee);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .generate-btn {
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }

        .generate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(167, 139, 250, 0.3);
        }

        .palette-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .color-swatch {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 30px 10px;
            cursor: pointer;
            transition: flex 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        .color-swatch:hover {
            flex: 1.8;
        }

        .swatch-info {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
            pointer-events: none;
        }

        .color-swatch:hover .swatch-info {
            opacity: 1;
            transform: translateY(0);
        }

        .swatch-hex {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .swatch-rgb {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .swatch-name {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 4px;
        }

        .copied-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(74, 222, 128, 0.3);
            opacity: 0;
            transition: 0.3s;
            z-index: 100;
            pointer-events: none;
        }

        .copied-toast.show {
            opacity: 1;
        }

        .lock-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.3;
            transition: 0.2s;
        }

        .lock-icon:hover {
            opacity: 0.7;
        }

        .lock-icon.locked {
            opacity: 1;
        }

        .harmony-bar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .harmony-bar select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }

        kbd {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 8px;
        }
    </style>
</head>

<body>
    <div class="topbar">
        <a href="index.html">← Gallery</a>
        <h1>Palette Generator</h1>
        <div class="harmony-bar">
            <select id="harmony">
                <option value="random">Random</option>
                <option value="analogous">Analogous</option>
                <option value="complementary">Complementary</option>
                <option value="triadic">Triadic</option>
                <option value="monochromatic">Monochromatic</option>
                <option value="pastel">Pastel</option>
                <option value="dark">Dark Mode</option>
                <option value="warm">Warm</option>
                <option value="cool">Cool</option>
            </select>
            <button class="generate-btn" id="generate">Generate <kbd>Space</kbd></button>
        </div>
    </div>

    <div class="palette-container" id="palette"></div>
    <div class="copied-toast" id="toast">Copied!</div>

    <script>
        const palette = document.getElementById('palette');
        const toast = document.getElementById('toast');
        const harmonySelect = document.getElementById('harmony');
        const generateBtn = document.getElementById('generate');

        let locked = [false, false, false, false, false];
        let currentColors = [];

        function hslToHex(h, s, l) {
            l /= 100; s /= 100;
            const a = s * Math.min(l, 1 - l);
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function luminance(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return 0.299 * r + 0.587 * g + 0.114 * b;
        }

        function getColorName(hex) {
            const lum = luminance(hex);
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);

            if (max - min < 30) {
                if (lum > 0.8) return 'White';
                if (lum > 0.5) return 'Silver';
                if (lum > 0.2) return 'Gray';
                return 'Black';
            }
            if (r > g && r > b) return lum > 0.5 ? 'Salmon' : 'Crimson';
            if (g > r && g > b) return lum > 0.5 ? 'Mint' : 'Forest';
            if (b > r && b > g) return lum > 0.5 ? 'Sky' : 'Navy';
            if (r > b && g > b) return lum > 0.5 ? 'Lemon' : 'Olive';
            if (r > g && b > g) return lum > 0.5 ? 'Lavender' : 'Plum';
            return lum > 0.5 ? 'Teal' : 'Cyan';
        }

        function generateColors() {
            const harmony = harmonySelect.value;
            const baseHue = Math.random() * 360;
            const colors = [];

            for (let i = 0; i < 5; i++) {
                if (locked[i] && currentColors[i]) {
                    colors.push(currentColors[i]);
                    continue;
                }

                let h, s, l;
                switch (harmony) {
                    case 'analogous':
                        h = (baseHue + i * 25 - 50) % 360;
                        s = 60 + Math.random() * 30;
                        l = 40 + Math.random() * 30;
                        break;
                    case 'complementary':
                        h = (baseHue + (i % 2 === 0 ? 0 : 180) + (Math.random() - 0.5) * 30) % 360;
                        s = 60 + Math.random() * 30;
                        l = 35 + Math.random() * 35;
                        break;
                    case 'triadic':
                        h = (baseHue + i * 120 + (Math.random() - 0.5) * 20) % 360;
                        s = 55 + Math.random() * 35;
                        l = 40 + Math.random() * 30;
                        break;
                    case 'monochromatic':
                        h = baseHue;
                        s = 50 + Math.random() * 40;
                        l = 15 + i * 15 + Math.random() * 10;
                        break;
                    case 'pastel':
                        h = Math.random() * 360;
                        s = 50 + Math.random() * 30;
                        l = 70 + Math.random() * 20;
                        break;
                    case 'dark':
                        h = Math.random() * 360;
                        s = 30 + Math.random() * 40;
                        l = 8 + Math.random() * 25;
                        break;
                    case 'warm':
                        h = (Math.random() * 60 - 10 + 360) % 360;
                        s = 60 + Math.random() * 35;
                        l = 35 + Math.random() * 35;
                        break;
                    case 'cool':
                        h = 180 + Math.random() * 120;
                        s = 50 + Math.random() * 40;
                        l = 30 + Math.random() * 40;
                        break;
                    default:
                        h = Math.random() * 360;
                        s = 40 + Math.random() * 50;
                        l = 25 + Math.random() * 50;
                }
                colors.push(hslToHex(h, s, l));
            }

            currentColors = colors;
            renderPalette();
        }

        function renderPalette() {
            palette.innerHTML = '';
            currentColors.forEach((hex, i) => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.background = hex;

                const textColor = luminance(hex) > 0.5 ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.9)';

                swatch.innerHTML = `
                    <span class="lock-icon ${locked[i] ? 'locked' : ''}" data-i="${i}">${locked[i] ? '🔒' : '🔓'}</span>
                    <div class="swatch-info" style="color:${textColor}">
                        <div class="swatch-hex">${hex.toUpperCase()}</div>
                        <div class="swatch-rgb">${hexToRgb(hex)}</div>
                        <div class="swatch-name">${getColorName(hex)}</div>
                    </div>
                `;

                swatch.addEventListener('click', e => {
                    if (e.target.classList.contains('lock-icon')) return;
                    navigator.clipboard.writeText(hex.toUpperCase());
                    toast.textContent = `Copied ${hex.toUpperCase()}`;
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 1500);
                });

                swatch.querySelector('.lock-icon').addEventListener('click', e => {
                    e.stopPropagation();
                    locked[i] = !locked[i];
                    renderPalette();
                });

                palette.appendChild(swatch);
            });
        }

        // Generate on spacebar
        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && !e.target.closest('select')) {
                e.preventDefault();
                generateColors();
            }
        });

        generateBtn.addEventListener('click', generateColors);

        // Initialize
        generateColors();
    </script>
