<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%8E%B6%3C%2Ftext%3E%3C%2Fsvg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Theremin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --accent: #2dd4bf;
            --text: #f0eef5;
            --text-muted: #8888a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Theremin Play Area */
        #play-area {
            position: absolute;
            inset: 0;
            z-index: 1;
            cursor: crosshair;
            background: radial-gradient(circle at 50% 50%, rgba(45, 212, 191, 0.05) 0%, transparent 60%);
        }

        /* Visualizer Element */
        #orb {
            position: absolute;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 30px var(--accent), 0 0 60px var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 2;
        }

        .ripple {
            position: absolute;
            border: 2px solid var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: ripple-out 1s linear forwards;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes ripple-out {
            0% {
                width: 40px;
                height: 40px;
                opacity: 0.8;
            }

            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }

        /* Grid lines for visual feedback */
        .grid-lines {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            z-index: 0;
            pointer-events: none;
        }

        /* WWG Back Button */
        .wwg-back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a78bfa;
            z-index: 99999;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .wwg-back-btn:hover {
            background: rgba(167, 139, 250, 0.2);
            border-color: rgba(167, 139, 250, 0.4);
            transform: scale(1.05) translateX(-2px);
            color: #fff;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.3);
        }

        /* Controls UI */
        .ui-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
            /* Let clicks pass through to play area when not interacting directly */
            width: 280px;
            text-align: right;
        }

        .ui-panel>* {
            pointer-events: auto;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 2px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .instrument-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
            text-align: left;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .control-group label span {
            color: var(--text);
            font-weight: 500;
            font-family: monospace;
        }

        .btn-power {
            background: rgba(167, 139, 250, 0.15);
            border: 1px solid rgba(167, 139, 250, 0.3);
            color: #a78bfa;
            padding: 12px;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            width: 100%;
        }

        .btn-power:hover {
            background: rgba(167, 139, 250, 0.3);
        }

        .btn-power.active {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        select option {
            background: var(--bg);
        }

        /* Overlay message */
        .instruction-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.5s;
        }

        .instruction-overlay h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .axes-labels {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .axis-y {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1rem;
        }

        .axis-x {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1rem;
        }
    </style>
</head>

<body>

    <a href="index.html" class="wwg-back-btn" title="Back to Gallery">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </a>

    <div class="grid-lines"></div>

    <div class="axes-labels">
        <div class="axis-y">← Volume →</div>
        <div class="axis-x">← Pitch →</div>
    </div>

    <div id="play-area"></div>
    <div id="orb"></div>

    <div class="instruction-overlay" id="instruction">
        <h2>Click Power to Start</h2>
    </div>

    <div class="ui-panel">
        <div class="header">
            <h1>Digital Theremin</h1>
            <p>Move mouse to synthesize</p>
        </div>

        <button class="btn-power" id="btn-power">Power On</button>

        <div class="instrument-panel">
            <div class="control-group">
                <label>Waveform</label>
                <select id="waveform-select">
                    <option value="sine">Sine (Classic)</option>
                    <option value="triangle">Triangle (Smooth)</option>
                    <option value="square">Square (Retro 8-bit)</option>
                    <option value="sawtooth">Sawtooth (Harsh)</option>
                </select>
            </div>

            <div class="control-group" style="margin-top: 10px;">
                <label>Frequency <span id="val-freq">0 Hz</span></label>
            </div>
            <div class="control-group">
                <label>Volume <span id="val-vol">0 %</span></label>
            </div>
        </div>
    </div>

    <script>
        const playArea = document.getElementById('play-area');
        const orb = document.getElementById('orb');
        const btnPower = document.getElementById('btn-power');
        const instruction = document.getElementById('instruction');
        const valFreq = document.getElementById('val-freq');
        const valVol = document.getElementById('val-vol');
        const waveformSelect = document.getElementById('waveform-select');

        let audioCtx;
        let oscillator;
        let gainNode;
        let isPowerOn = false;

        const MIN_FREQ = 60;   // Low rumble
        const MAX_FREQ = 2500; // High squeal

        // Initialize Audio context (needs user gesture)
        function initAudio() {
            // Safari uses webkitAudioContext
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            // Set initial waveform
            oscillator.type = waveformSelect.value;

            // Smoother volume transitions to prevent audio popping
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);

            // Connect nodes
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
        }

        waveformSelect.addEventListener('change', (e) => {
            if (oscillator) {
                oscillator.type = e.target.value;
            }
        });

        btnPower.addEventListener('click', () => {
            if (!isPowerOn) {
                if (!audioCtx) initAudio();

                // Resume if suspended
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                isPowerOn = true;
                btnPower.classList.add('active');
                btnPower.textContent = 'Power Off';
                instruction.style.opacity = '0';
                orb.style.opacity = '1';

            } else {
                // Turn off
                if (audioCtx) {
                    // Ramp volume down quickly before suspending
                    gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                    setTimeout(() => {
                        audioCtx.suspend();
                    }, 100);
                }

                isPowerOn = false;
                btnPower.classList.remove('active');
                btnPower.textContent = 'Power On';
                instruction.style.opacity = '1';
                orb.style.opacity = '0';
                valFreq.textContent = '0 Hz';
                valVol.textContent = '0 %';
            }
        });

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.classList.add('ripple');
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            document.body.appendChild(ripple);

            // garbage collect
            setTimeout(() => {
                ripple.remove();
            }, 1000);
        }

        // Mouse tracking for Theremin logic
        let lastRippleTime = 0;

        playArea.addEventListener('mousemove', (e) => {
            if (!isPowerOn) return;

            const x = e.clientX;
            const y = e.clientY;

            // Move visual orb
            orb.style.left = `${x}px`;
            orb.style.top = `${y}px`;

            // Audio Math
            // Pitch (X Axis, Exponential for natural octaves)
            const xRatio = x / window.innerWidth;
            // Formula for exponential frequency curve
            const freq = MIN_FREQ * Math.pow((MAX_FREQ / MIN_FREQ), xRatio);

            // Volume (Y Axis, louder at bottom)
            const yRatio = y / window.innerHeight;
            // Invert so bottom is louder, top is quieter (classic Theremin height mapping)
            const vol = Math.max(0, Math.min(1, yRatio));

            // Apply to Web Audio nodes smoothly
            // setTargetAtTime provides a smooth slide (portamento) effect without clicking
            oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
            gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);

            // Update UI
            valFreq.textContent = `${Math.round(freq)} Hz`;
            valVol.textContent = `${Math.round(vol * 100)} %`;

            // Dynamic orb glow based on volume
            orb.style.boxShadow = `0 0 ${30 + (vol * 50)}px var(--accent), 0 0 ${60 + (vol * 100)}px var(--accent)`;
            orb.style.transform = `translate(-50%, -50%) scale(${0.8 + (vol * 0.4)})`;

            // Emit ripples periodically when moving based on frequency
            const now = Date.now();
            // Higher frequency = faster ripples
            const rippleDelay = 200 - (150 * xRatio);
            if (now - lastRippleTime > rippleDelay && vol > 0.05) {
                createRipple(x, y);
                lastRippleTime = now;
            }
        });

        // Mute when mouse leaves window
        playArea.addEventListener('mouseleave', () => {
            if (isPowerOn && gainNode) {
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                valVol.textContent = `0 %`;
                orb.style.opacity = '0';
            }
        });

        playArea.addEventListener('mouseenter', (e) => {
            if (isPowerOn && gainNode) {
                orb.style.opacity = '1';
                // Trigger mouse move to restore volume immediately
                const fakeEvent = new MouseEvent('mousemove', {
                    clientX: e.clientX,
                    clientY: e.clientY
                });
                playArea.dispatchEvent(fakeEvent);
            }
        });

    </script>
