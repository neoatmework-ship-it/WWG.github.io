<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%AA%90%3C%2Ftext%3E%3C%2Fsvg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Sandbox</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d0c13;
            --bg-card: rgba(20, 18, 28, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #2dd4bf;
            --accent-glow: rgba(45, 212, 191, 0.3);
            --text: #f0eef5;
            --text-muted: #8888a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(45, 212, 191, 0.05) 0%, transparent 50%),
                radial-gradient(circle at bottom left, rgba(167, 139, 250, 0.05) 0%, transparent 50%);
            padding: 20px;
            overflow: hidden;
        }

        /* WWG Back Button */
        .wwg-back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a78bfa;
            z-index: 99999;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .wwg-back-btn:hover {
            background: rgba(167, 139, 250, 0.2);
            border-color: rgba(167, 139, 250, 0.4);
            transform: scale(1.05) translateX(-2px);
            color: #fff;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.3);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .header {
            text-align: center;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.desc {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .material-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            outline: none;
        }

        .material-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .material-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .btn-action {
            background: rgba(244, 114, 182, 0.1);
            border-color: rgba(244, 114, 182, 0.3);
            color: #f472b6;
        }

        .btn-action:hover {
            background: rgba(244, 114, 182, 0.2);
        }

        .canvas-container {
            position: relative;
            background: #000;
            border-radius: 16px;
            border: 2px solid var(--border);
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            /* Square canvas */
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            cursor: crosshair;
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 15px;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .gravity-arrow {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .arrow-icon {
            color: var(--accent);
            font-size: 20px;
            font-weight: bold;
            line-height: 1;
        }

        .hint {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85em;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <a href="index.html" class="wwg-back-btn" title="Back to Gallery">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </a>

    <div class="container">
        <div class="header">
            <h1>Gravity Sandbox 🪐</h1>
            <p class="desc">A fluid dynamics sandbox with adjustable gravity vectors</p>
        </div>

        <div class="controls">
            <button class="material-btn active" data-mat="water">
                <span class="color-dot" style="background:#3b82f6;"></span> Water
            </button>
            <button class="material-btn" data-mat="sand">
                <span class="color-dot" style="background:#fbbf24;"></span> Sand
            </button>
            <button class="material-btn" data-mat="lava">
                <span class="color-dot" style="background:#ef4444; box-shadow: 0 0 8px #ef4444;"></span> Lava
            </button>
            <button class="material-btn" data-mat="acid">
                <span class="color-dot" style="background:#22c55e; box-shadow: 0 0 8px #22c55e;"></span> Acid
            </button>
            <button class="material-btn" data-mat="wall">
                <span class="color-dot" style="background:#6b7280;"></span> Wall
            </button>
            <button class="material-btn" data-mat="eraser">
                <span class="color-dot" style="border:1px solid #fff; background:transparent;"></span> Eraser
            </button>
            <div style="width: 2px; background: var(--border); margin: 0 5px;"></div>
            <button class="material-btn btn-action" id="btn-clear">Clear All</button>
        </div>

        <div class="canvas-container">
            <canvas id="sim-canvas"></canvas>
            <div class="hud">
                <div id="hud-particles">Particles: 0</div>
                <div id="hud-grav">Gravity: Down (y: 1)</div>
            </div>
            <div class="gravity-arrow" id="grav-arrow">
                <div class="arrow-icon">↓</div>
            </div>
        </div>

        <p class="hint">Draw with <kbd>Left Click</kbd> • Change Gravity with <kbd>Arrow Keys</kbd></p>
    </div>

    <script>
        const canvas = document.getElementById('sim-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true, alpha: false });

        // Simulation grid dimensions (low res for falling sand style)
        const GRID_W = 100;
        const GRID_H = 100;
        canvas.width = GRID_W;
        canvas.height = GRID_H;

        // Materials dictionary
        const MAT = {
            EMPTY: 0,
            WALL: 1,
            SAND: 2,
            WATER: 3,
            LAVA: 4,
            ACID: 5,
            STEAM: 6
        };

        const COLORS = {
            [MAT.EMPTY]: [0, 0, 0, 255],
            [MAT.WALL]: [120, 120, 130, 255],
            [MAT.SAND]: [250, 200, 80, 255],  // Gets varied slightly
            [MAT.WATER]: [40, 120, 230, 255],
            [MAT.LAVA]: [240, 60, 20, 255],
            [MAT.ACID]: [40, 220, 80, 255],
            [MAT.STEAM]: [200, 200, 220, 150]
        };

        // Grid data
        // For performance, store everything in flat Uint8Arrays
        let grid = new Uint8Array(GRID_W * GRID_H);
        let nextGrid = new Uint8Array(GRID_W * GRID_H);
        let updated = new Uint8Array(GRID_W * GRID_H); // track who moved this frame

        // For pretty rendering, store persistent color variations
        let colorGrid = new Uint32Array(GRID_W * GRID_H);

        // Image data for rendering
        const imgData = ctx.createImageData(GRID_W, GRID_H);
        const imgData32 = new Uint32Array(imgData.data.buffer);

        // State variables
        let currentMat = MAT.WATER;
        let isDrawing = false;
        let mouseX = 0;
        let mouseY = 0;
        let brushSize = 4;

        // Gravity Vector (dx, dy)
        let gravX = 0;
        let gravY = 1;

        // HUD elements
        const hudParts = document.getElementById('hud-particles');
        const hudGrav = document.getElementById('hud-grav');
        const gravArrow = document.getElementById('grav-arrow');

        // Helpers
        const getIdx = (x, y) => Math.floor(y) * GRID_W + Math.floor(x);
        const inBounds = (x, y) => x >= 0 && x < GRID_W && y >= 0 && y < GRID_H;
        const isEmpty = (x, y, g = grid) => inBounds(x, y) && g[getIdx(x, y)] === MAT.EMPTY;
        const isLiquid = (mat) => mat === MAT.WATER || mat === MAT.LAVA || mat === MAT.ACID;
        const isGas = (mat) => mat === MAT.STEAM;
        const getDensity = (mat) => {
            if (mat === MAT.WALL) return 999;
            if (mat === MAT.SAND) return 10;
            if (mat === MAT.LAVA) return 5;
            if (mat === MAT.WATER) return 3;
            if (mat === MAT.ACID) return 3;
            if (mat === MAT.STEAM) return -1;
            return 0; // empty
        }

        // Draw variation color based on material
        function getVariedColor(mat) {
            let [r, g, b, a] = COLORS[mat];
            if (mat === MAT.SAND || mat === MAT.WALL) {
                const varAmt = (Math.random() - 0.5) * 30;
                r = Math.min(255, Math.max(0, r + varAmt));
                g = Math.min(255, Math.max(0, g + varAmt));
                b = Math.min(255, Math.max(0, b + varAmt));
            } else if (mat === MAT.WATER || mat === MAT.ACID) {
                const varAmt = (Math.random() - 0.5) * 20;
                g = Math.min(255, Math.max(0, g + varAmt));
                b = Math.min(255, Math.max(0, b + varAmt));
            } else if (mat === MAT.LAVA) {
                r = 255;
                g = Math.max(0, g + (Math.random() * 40 - 10)); // brighter spots
            }

            // returning 32-bit int ABGR
            return (a << 24) | (b << 16) | (g << 8) | r;
        }

        function spawnMaterial(cx, cy, radius, mat) {
            for (let y = -radius; y <= radius; y++) {
                for (let x = -radius; x <= radius; x++) {
                    if (x * x + y * y <= radius * radius) {
                        const px = Math.floor(cx + x);
                        const py = Math.floor(cy + y);
                        if (inBounds(px, py)) {
                            const idx = getIdx(px, py);
                            // Avoid overwriting walls unless erasing
                            if (mat === MAT.EMPTY || grid[idx] !== MAT.WALL || mat === MAT.WALL) {
                                // Add some random chance to make brush softer for particles
                                if (mat === MAT.WALL || mat === MAT.EMPTY || Math.random() > 0.4) {
                                    grid[idx] = mat;
                                    colorGrid[idx] = (mat === MAT.EMPTY) ? 0 : getVariedColor(mat);
                                }
                            }
                        }
                    }
                }
            }
        }

        function swap(oldX, oldY, newX, newY, idxOld) {
            const idxNew = getIdx(newX, newY);

            const mat1 = grid[idxOld];
            const col1 = colorGrid[idxOld];

            const mat2 = grid[idxNew];
            const col2 = colorGrid[idxNew];

            nextGrid[idxNew] = mat1;
            colorGrid[idxNew] = col1;
            updated[idxNew] = 1;

            nextGrid[idxOld] = mat2;
            colorGrid[idxOld] = col2;
            updated[idxOld] = 1;

            // Update local refs just in case we query them in the same pass
            grid[idxNew] = mat1;
            grid[idxOld] = mat2;
        }

        function interact(x, y, dx, dy, idxMe, matMe, matTarget) {
            // Acid eats everything except walls and empty
            if (matMe === MAT.ACID && matTarget !== MAT.EMPTY && matTarget !== MAT.WALL && matTarget !== MAT.ACID) {
                if (Math.random() > 0.5) {
                    nextGrid[getIdx(x + dx, y + dy)] = MAT.STEAM;
                    colorGrid[getIdx(x + dx, y + dy)] = getVariedColor(MAT.STEAM);
                    nextGrid[idxMe] = MAT.EMPTY;
                    updated[getIdx(x + dx, y + dy)] = 1;
                    updated[idxMe] = 1;
                    return true;
                }
            }
            // Lava evaporates water
            if (matMe === MAT.LAVA && matTarget === MAT.WATER) {
                nextGrid[getIdx(x + dx, y + dy)] = MAT.STEAM;
                colorGrid[getIdx(x + dx, y + dy)] = getVariedColor(MAT.STEAM);
                nextGrid[idxMe] = MAT.WALL; // Lava becomes stone
                colorGrid[idxMe] = getVariedColor(MAT.WALL);
                updated[getIdx(x + dx, y + dy)] = 1;
                updated[idxMe] = 1;
                return true;
            }
            return false;
        }

        function updateStep() {
            // Copy state and clear update tracker
            nextGrid.set(grid);
            updated.fill(0);
            let particleCount = 0;

            // Determine iteration direction based on gravity to avoid particles sticking
            // Always read bottom-up relative to gravity
            const xStart = gravX > 0 ? GRID_W - 1 : 0;
            const xEnd = gravX > 0 ? -1 : GRID_W;
            const xStep = gravX > 0 ? -1 : 1;

            const yStart = gravY > 0 ? GRID_H - 1 : 0;
            const yEnd = gravY > 0 ? -1 : GRID_H;
            const yStep = gravY > 0 ? -1 : 1;

            for (let y = yStart; y !== yEnd; y += yStep) {
                for (let x = xStart; x !== xEnd; x += xStep) {
                    const idx = getIdx(x, y);
                    const mat = grid[idx];

                    if (mat === MAT.EMPTY) continue;
                    particleCount++;

                    if (mat === MAT.WALL || updated[idx]) continue;

                    let moved = false;
                    const densMe = getDensity(mat);
                    const gasMlt = isGas(mat) ? -1 : 1; // gases flow opposite to gravity

                    const gDX = gravX * gasMlt;
                    const gDY = gravY * gasMlt;

                    // 1. Try to move directly along gravity vector
                    const nx1 = x + gDX;
                    const ny1 = y + gDY;

                    if (inBounds(nx1, ny1)) {
                        const targetMat = grid[getIdx(nx1, ny1)];
                        const densTar = getDensity(targetMat);

                        if (interact(x, y, gDX, gDY, idx, mat, targetMat)) continue;

                        if (densMe > densTar) {
                            swap(x, y, nx1, ny1, idx);
                            moved = true;
                        }
                    } else if (mat !== MAT.STEAM) {
                        // hit world bound
                    }

                    if (moved) continue;

                    // 2. Try diagonal tumbling
                    const dir = Math.random() > 0.5 ? 1 : -1; // random bias L/R
                    let dxA, dyA, dxB, dyB;

                    if (gravY !== 0 && gravX === 0) {
                        // Vertical gravity (down/up) -> spread horizontally
                        dxA = dir; dyA = gDY;
                        dxB = -dir; dyB = gDY;
                    } else if (gravX !== 0 && gravY === 0) {
                        // Horizontal gravity (left/right) -> spread vertically
                        dxA = gDX; dyA = dir;
                        dxB = gDX; dyB = -dir;
                    } else {
                        // Diagonal gravity
                        dxA = gDX; dyA = 0;
                        dxB = 0; dyB = gDY;
                    }

                    const tryMove = (dx, dy) => {
                        const nx = x + dx;
                        const ny = y + dy;
                        if (inBounds(nx, ny)) {
                            const tMat = grid[getIdx(nx, ny)];
                            if (interact(x, y, dx, dy, idx, mat, tMat)) return true;
                            if (densMe > getDensity(tMat)) {
                                swap(x, y, nx, ny, idx);
                                return true;
                            }
                        }
                        return false;
                    };

                    if (tryMove(dxA, dyA)) continue;
                    if (tryMove(dxB, dyB)) continue;

                    // 3. Liquid specific sliding (perpendicular to gravity)
                    if (isLiquid(mat) || isGas(mat)) {
                        let sxA, syA, sxB, syB;
                        if (gravY !== 0 && gravX === 0) {
                            sxA = dir; syA = 0;
                            sxB = -dir; syB = 0;
                        } else if (gravX !== 0 && gravY === 0) {
                            sxA = 0; syA = dir;
                            sxB = 0; syB = -dir;
                        } else {
                            sxA = -gDX; syA = gDY;
                            sxB = gDX; syB = -gDY;
                        }

                        if (tryMove(sxA, syA)) continue;
                        if (tryMove(sxB, syB)) continue;
                    }

                    // Lifetime for steam
                    if (mat === MAT.STEAM) {
                        if (Math.random() < 0.05) {
                            nextGrid[idx] = MAT.EMPTY;
                            updated[idx] = 1;
                            particleCount--;
                        }
                    }
                }
            }

            grid.set(nextGrid);
            hudParts.textContent = `Particles: ${particleCount}`;
        }

        function render() {
            // Fill image data fast
            for (let i = 0; i < GRID_W * GRID_H; i++) {
                imgData32[i] = grid[i] === MAT.EMPTY ? 0xFF000000 : colorGrid[i];
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function gameLoop() {
            if (isDrawing) {
                // scale mouse to grid
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const gridX = (mouseX - rect.left) * scaleX;
                const gridY = (mouseY - rect.top) * scaleY;
                spawnMaterial(gridX, gridY, currentMat === MAT.WALL ? brushSize + 1 : brushSize, currentMat);
            }

            updateStep();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Input Handling
        const buttons = document.querySelectorAll('.material-btn[data-mat]');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const m = btn.dataset.mat;
                if (m === 'water') currentMat = MAT.WATER;
                if (m === 'sand') currentMat = MAT.SAND;
                if (m === 'lava') currentMat = MAT.LAVA;
                if (m === 'acid') currentMat = MAT.ACID;
                if (m === 'wall') currentMat = MAT.WALL;
                if (m === 'eraser') currentMat = MAT.EMPTY;
            });
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            grid.fill(0);
            nextGrid.fill(0);
            colorGrid.fill(0);
        });

        canvas.addEventListener('mousedown', e => { isDrawing = true; mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mouseup', () => isDrawing = false);

        // Touch support
        canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, { passive: false });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, { passive: false });
        window.addEventListener('touchend', () => { isDrawing = false; });

        // Gravity controls
        window.addEventListener('keydown', e => {
            const rotSpeed = 90;
            switch (e.key) {
                case 'ArrowUp': gravX = 0; gravY = -1; hudGrav.textContent = `Gravity: Up (y: -1)`; gravArrow.style.transform = 'rotate(180deg)'; break;
                case 'ArrowDown': gravX = 0; gravY = 1; hudGrav.textContent = `Gravity: Down (y: 1)`; gravArrow.style.transform = 'rotate(0deg)'; break;
                case 'ArrowLeft': gravX = -1; gravY = 0; hudGrav.textContent = `Gravity: Left (x: -1)`; gravArrow.style.transform = 'rotate(90deg)'; break;
                case 'ArrowRight': gravX = 1; gravY = 0; hudGrav.textContent = `Gravity: Right (x: 1)`; gravArrow.style.transform = 'rotate(-90deg)'; break;
            }
        });

        // Add some starting walls
        for (let i = 0; i < GRID_W; i++) {
            grid[getIdx(i, GRID_H - 1)] = MAT.WALL; colorGrid[getIdx(i, GRID_H - 1)] = getVariedColor(MAT.WALL);
            grid[getIdx(i, 0)] = MAT.WALL; colorGrid[getIdx(i, 0)] = getVariedColor(MAT.WALL);
            grid[getIdx(0, i)] = MAT.WALL; colorGrid[getIdx(0, i)] = getVariedColor(MAT.WALL);
            grid[getIdx(GRID_W - 1, i)] = MAT.WALL; colorGrid[getIdx(GRID_W - 1, i)] = getVariedColor(MAT.WALL);
        }

        // Fun starting bowl
        for (let x = 20; x < 80; x++) {
            let y = Math.floor(60 + Math.sin(x / 10) * 15);
            grid[getIdx(x, y)] = MAT.WALL; colorGrid[getIdx(x, y)] = getVariedColor(MAT.WALL);
            grid[getIdx(x, y + 1)] = MAT.WALL; colorGrid[getIdx(x, y + 1)] = getVariedColor(MAT.WALL);
        }

        // Start
        requestAnimationFrame(gameLoop);

    </script>
