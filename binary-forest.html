<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINARY FOREST // FRAGMENT</title>
    <script src="discovery.js"></script>
    <style>
        body {
            margin: 0;
            background: #020205;
            overflow: hidden;
            color: #0f0;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .ui {
            position: fixed;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }

        .hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            opacity: 0.3;
            font-size: 10px;
        }

        .exit {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: #004400;
            text-decoration: none;
            font-size: 12px;
            transition: 0.3s;
        }

        .exit:hover {
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>

<body>
    <div class="ui">
        [FRAGMENT_404_FOREST]<br>
        DATA_STRUCTURE_GROWTH: ACTIVE
    </div>
    <div class="hint">CLICK TO PLANT NEW SEED // MOUSE TO SWAY</div>
    <a href="archive.html" class="exit">RETURN_TO_VAULT</a>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let trees = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.onresize = init;
        init();

        class Tree {
            constructor(x) {
                this.x = x;
                this.y = height;
                this.branches = [];
                this.maxLevel = 5 + Math.random() * 5;
                this.angleOffset = 0;
            }

            draw(ctx, x, y, angle, length, level) {
                if (level > this.maxLevel) return;

                const x2 = x + Math.cos(angle + this.angleOffset) * length;
                const y2 = y + Math.sin(angle + this.angleOffset) * length;

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `rgba(0, 255, 0, ${1 - level / 12})`;
                ctx.lineWidth = Math.max(1, 10 - level * 2);
                ctx.stroke();

                // Binary Character
                ctx.fillStyle = `rgba(0, 255, 0, ${0.5 - level / 20})`;
                ctx.font = `${14 - level}px monospace`;
                ctx.fillText(Math.random() > 0.5 ? '1' : '0', x2 + 5, y2);

                this.draw(ctx, x2, y2, angle - 0.5, length * 0.75, level + 1);
                this.draw(ctx, x2, y2, angle + 0.5, length * 0.75, level + 1);
            }

            render(ctx, mouseX) {
                this.angleOffset = (mouseX / width - 0.5) * 0.2;
                this.draw(ctx, this.x, this.y, -Math.PI / 2, 100, 0);
            }
        }

        let mouseX = width / 2;
        window.onmousemove = (e) => mouseX = e.clientX;
        window.onclick = (e) => trees.push(new Tree(e.clientX));

        // Initial forest
        for (let i = 0; i < 3; i++) trees.push(new Tree(Math.random() * width));

        function animate() {
            ctx.fillStyle = 'rgba(2, 2, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            trees.forEach(t => t.render(ctx, mouseX));
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
