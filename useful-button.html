<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Useful Button | Interaction Overload</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --accent: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fafafa;
            color: #111;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        canvas#feedback-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            transition: transform 0.1s;
        }

        .useful-btn {
            background: linear-gradient(135deg, var(--primary), #059669);
            color: white;
            border: none;
            padding: 25px 60px;
            font-size: 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
            user-select: none;
        }

        .useful-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 50px rgba(16, 185, 129, 0.4);
        }

        .useful-btn:active {
            transform: scale(0.95) translateY(2px);
        }

        #meta-stats {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .mini-btn {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .mini-btn:hover {
            transform: scale(1.2);
        }

        .back-link {
            position: fixed;
            bottom: 40px;
            color: #ccc;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
            z-index: 100;
        }

        .back-link:hover {
            color: #111;
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <canvas id="feedback-canvas"></canvas>

    <div class="container" id="main-container">
        <button class="useful-btn" id="master-btn">USE ME</button>
        <div id="meta-stats">USEFULNESS: 0%</div>
    </div>

    <a href="index.html" class="back-link">← RETURN TO THE MUNDANE</a>

    <script>
        const btn = document.getElementById('master-btn');
        const stats = document.getElementById('meta-stats');
        const container = document.getElementById('main-container');
        const canvas = document.getElementById('feedback-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let clicks = 0;
        let particles = [];

        const phrases = [
            "CLICK ME", "STILL USEFUL", "KEEP GOING", "ALMOST THERE", "CRITICAL", "OVERLOAD", "!!!"
        ];

        btn.onclick = () => {
            clicks++;
            const usefulness = Math.min(100, clicks * 5);
            stats.textContent = `USEFULNESS: ${usefulness}%`;

            // Random Phrase
            btn.textContent = phrases[Math.floor(clicks / 3) % phrases.length];

            // Feedback
            spawnParticles(width / 2, height / 2);
            vibrate();

            if (clicks === 20) {
                explode();
            }
        };

        function spawnParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`
                });
            }
        }

        function vibrate() {
            container.style.transform = `translate(${(Math.random() - 0.5) * 10}px, ${(Math.random() - 0.5) * 10}px)`;
            setTimeout(() => container.style.transform = 'none', 50);
        }

        function explode() {
            btn.style.animation = 'explode 0.5s forwards';
            setTimeout(() => {
                btn.style.display = 'none';
                stats.textContent = "USEFULNESS EXCEEDED DATA CAPACITY";
                for (let i = 0; i < 100; i++) {
                    createMiniBtn();
                }
            }, 500);
        }

        function createMiniBtn() {
            const m = document.createElement('button');
            m.className = 'mini-btn';
            const x = Math.random() * (width - 40);
            const y = Math.random() * (height - 40);
            m.style.left = x + 'px';
            m.style.top = y + 'px';
            m.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
            m.onclick = () => {
                spawnParticles(x + 20, y + 20);
                m.style.transform = 'scale(0)';
                setTimeout(() => m.remove(), 200);
            };
            document.body.appendChild(m);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }
        draw();

        // Audio pop
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        function playPop() {
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.frequency.setValueAtTime(150 + Math.random() * 200, ac.currentTime);
            gain.gain.setValueAtTime(0.1, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(); osc.stop(ac.currentTime + 0.1);
        }
        window.addEventListener('mousedown', playPop);

    </script>
</body>

</html>
