<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DEEP</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --depth: 0;
            --pressure: 0;
            --bg-top: #102a43;
            --bg-bottom: #010203;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #4a8270;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #abyss-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .viewport {
            position: relative;
            z-index: 10;
            text-align: center;
            transition: transform 0.1s, filter 0.2s;
            transform: scale(calc(1 - var(--pressure) * 0.05)) skewX(calc(var(--pressure) * 2deg));
            filter: blur(calc(var(--pressure) * 1px));
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 5rem;
            letter-spacing: 20px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .hud {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 50;
            font-family: 'VT323', monospace;
            text-align: right;
            border-right: 4px solid #4a8270;
            padding-right: 20px;
        }

        .hud-val {
            font-size: 2.5rem;
            color: #fff;
        }

        .hud-label {
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        .back-link {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 50;
            color: rgba(74, 130, 112, 0.3);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }

        .pressure-warning {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-size: 0.7rem;
            letter-spacing: 5px;
            display: none;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .grain {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
            z-index: 100;
            pointer-events: none;
            opacity: 0.2;
        }
    </style>
</head>

<body>
    <div class="grain"></div>
    <div class="hud">
        <div class="hud-label">DEPTH</div>
        <div class="hud-val" id="depth-display">0 M</div>
        <div class="hud-label" style="margin-top: 10px;">PRESSURE</div>
        <div class="hud-val" id="pressure-display">1.0 ATM</div>
    </div>

    <a href="index.html" class="back-link">← ASCEND</a>

    <div class="viewport" id="vp">
        <p style="opacity: 0.4; letter-spacing: 5px; margin-bottom: 20px;">ZONE: ABYSSAL</p>
        <h1>DEEP</h1>
        <p id="msg" style="max-width: 400px; margin: 0 auto; line-height: 1.8; opacity: 0.6;">Scroll to descend into the
            crushing silence.</p>
    </div>

    <div class="pressure-warning" id="warning">⚠ PRESSURE CRITICAL ⚠</div>

    <canvas id="abyss-canvas"></canvas>

    <script>
        const canvas = document.getElementById('abyss-canvas');
        const ctx = canvas.getContext('2d');
        const vp = document.getElementById('vp');
        const depthDisplay = document.getElementById('depth-display');
        const pressureDisplay = document.getElementById('pressure-display');
        const warning = document.getElementById('warning');
        const msg = document.getElementById('msg');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let depth = 0;
        let targetDepth = 0;
        let pressure = 0;

        // Particles (Marine Snow)
        const snow = Array.from({ length: 400 }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            s: Math.random() * 2 + 1,
            v: Math.random() * 0.5 + 0.1
        }));

        function drawAbyss() {
            // Smoothly move towards target depth
            depth += (targetDepth - depth) * 0.1;
            pressure = Math.max(0, (depth / 10000));

            // Update UI
            depthDisplay.textContent = Math.floor(depth).toLocaleString() + " M";
            pressureDisplay.textContent = (1.0 + (depth / 10)).toFixed(1) + " ATM";

            document.documentElement.style.setProperty('--pressure', pressure);

            if (pressure > 0.8) warning.style.display = 'block';
            else warning.style.display = 'none';

            // Background color shift
            const bgAlpha = Math.min(1, depth / 2000);
            ctx.fillStyle = `rgb(${16 - bgAlpha * 15}, ${42 - bgAlpha * 40}, ${67 - bgAlpha * 65})`;
            ctx.fillRect(0, 0, width, height);

            // Draw Snow
            ctx.fillStyle = 'rgba(74, 130, 112, 0.5)';
            snow.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
                ctx.fill();

                // Move based on descent speed
                p.y -= (targetDepth - depth) * 0.05 + p.v;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
            });

            // Random bioluminescence
            if (depth > 5000 && Math.random() < 0.01) {
                ctx.fillStyle = 'rgba(0, 255, 200, 0.1)';
                ctx.beginPath();
                ctx.arc(Math.random() * width, Math.random() * height, 100, 0, Math.PI * 2);
                ctx.fill();
            }

            // Message update
            if (depth > 1000) msg.textContent = "The light of the surface is gone.";
            if (depth > 5000) msg.textContent = "You are where nothing should survive.";
            if (depth > 9000) msg.textContent = "Welcome to the Challenger Deep.";

            requestAnimationFrame(drawAbyss);
        }

        window.addEventListener('wheel', e => {
            targetDepth += e.deltaY;
            if (targetDepth < 0) targetDepth = 0;
        });

        drawAbyss();

        // Ambient Hum
        try {
            const ac = new AudioContext();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(40, ac.currentTime);
            gain.gain.setValueAtTime(0.1, ac.currentTime);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start();

            window.addEventListener('wheel', () => {
                osc.frequency.setTargetAtTime(40 + Math.min(100, targetDepth / 100), ac.currentTime, 0.5);
            });
        } catch (e) { }
    </script>
</body>

</html>
