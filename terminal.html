<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWG Internal Terminal | v3.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <script src="discovery.js"></script>
    <style>
        :root {
            --green: #00ff41;
            --bg: #030303;
            --dim: #003b00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: var(--green);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .crt-monitor {
            width: 95vw;
            height: 90vh;
            background: var(--bg);
            border: 20px solid #111;
            border-radius: 40px;
            position: relative;
            padding: 40px;
            box-shadow: inset 0 0 100px #000, 0 0 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .crt-monitor::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        #terminal-output {
            height: calc(100% - 40px);
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--green);
            scrollbar-width: none;
        }

        #terminal-output::-webkit-scrollbar {
            display: none;
        }

        .input-area {
            display: flex;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .prompt {
            margin-right: 10px;
        }

        #command-input {
            background: transparent;
            border: none;
            color: var(--green);
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex: 1;
            text-shadow: 0 0 5px var(--green);
        }

        .boot-screen {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 40px;
            font-size: 1rem;
            color: #fff;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background: var(--green);
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .secret-file {
            color: #d33682;
        }

        .dir {
            color: #268bd2;
        }
    </style>
</head>

<body>
    <div class="crt-monitor">
        <div id="boot" class="boot-screen"></div>
        <div id="terminal-output"></div>
        <div class="input-area">
            <span class="prompt" id="prompt-text">root@wwg:~$</span>
            <input type="text" id="command-input" autofocus spellcheck="false" autocomplete="off">
        </div>
    </div>

    <script>
        const output = document.getElementById('terminal-output');
        const input = document.getElementById('command-input');
        const boot = document.getElementById('boot');
        const promptText = document.getElementById('prompt-text');

        const fs = {
            'root': {
                'manifesto.txt': 'The Weird Website Gallery is a live organ.\nCreated in 1983. Found in 2024.\nIt does not want to be organized.',
                'staff': {
                    'pikav.log': 'Observer Pikav detected in Sector 7.\nPermission level: CRYSTAL.',
                    'admin.note': 'The glitch is intentional. Stop trying to "fix" it.'
                },
                'secrets': {
                    'void.key': 'Code: [VOID]\nFound in the vacuum of searching.',
                    'ghost.bin': 'Status: [ACTIVE]\nLocation: ghost.html',
                    'matrix.src': 'The core grid is a shell. The real code is underneath.'
                }
            }
        };

        let currentDir = fs.root;
        let currentPath = '~';

        const bootLines = [
            "WWG BIOS v3.2.1",
            "CPU: VIRTUAL_NEURON_777 @ 0Hz",
            "MEMORY: TOTAL_ENTROPY",
            "LOADING OS components...",
            "Checking drive C: [OK]",
            "Mounting /secrets/ [OK]",
            "Sanitizing data stream... [FAILED]",
            "IGNORING ERRORS...",
            "READY."
        ];

        async function startBoot() {
            for (let line of bootLines) {
                const p = document.createElement('p');
                p.textContent = '> ' + line;
                boot.appendChild(p);
                await new Promise(r => setTimeout(r, 200 + Math.random() * 500));
            }
            boot.style.display = 'none';
        }

        startBoot();

        input.onkeydown = (e) => {
            if (e.key === 'Enter') {
                const raw = input.value;
                const [cmd, ...args] = raw.trim().split(' ');
                writeToTerminal(`<span style="opacity: 0.5;">${promptText.textContent} ${raw}</span>`);
                handleCommand(cmd.toLowerCase(), args);
                input.value = '';
            }
        };

        function handleCommand(cmd, args) {
            switch (cmd) {
                case 'help':
                    writeToTerminal('Available commands: HELP, LS, CD, CAT, CLEAR, EXIT, WHOAMI');
                    break;
                case 'ls':
                    let items = Object.keys(currentDir).map(k => {
                        return typeof currentDir[k] === 'object' ? `<span class="dir">${k}/</span>` : k;
                    });
                    writeToTerminal(items.join('  '));
                    break;
                case 'cd':
                    if (!args[0] || args[0] === '..') {
                        currentDir = fs.root;
                        currentPath = '~';
                    } else if (currentDir[args[0]] && typeof currentDir[args[0]] === 'object') {
                        currentDir = currentDir[args[0]];
                        currentPath += '/' + args[0];
                    } else {
                        writeToTerminal(`Error: Directory '${args[0]}' not found.`);
                    }
                    promptText.textContent = `root@wwg:${currentPath}$`;
                    break;
                case 'cat':
                    if (currentDir[args[0]] && typeof currentDir[args[0]] === 'string') {
                        writeToTerminal(currentDir[args[0]]);
                    } else {
                        writeToTerminal(`Error: File '${args[0]}' not found.`);
                    }
                    break;
                case '3sc4p3r34lity':
                    writeToTerminal('[!] SYNCRONIZING_ALL_FRAGMENTS...');
                    writeToTerminal('[!] GLOBAL_RESTRICTIONS_LIFTED.');
                    Discovery.cheat_unlock_all();
                    break;
                case 'clear':
                    output.innerHTML = '';
                    break;
                case 'whoami':
                    writeToTerminal('AUTHENTICATED_FRAGMENT // SECTOR_07');
                    break;
                case 'exit':
                    window.location.href = 'index.html';
                    break;
                default:
                    if (cmd) writeToTerminal(`Command not found: ${cmd}`);
            }
        }

        function writeToTerminal(text) {
            output.innerHTML += text + '\n';
            output.scrollTop = output.scrollHeight;
            playTypingSound();
        }

        function playTypingSound() {
            try {
                const ac = new AudioContext();
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(400 + Math.random() * 200, ac.currentTime);
                gain.gain.setValueAtTime(0.02, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.05);
                osc.connect(gain); gain.connect(ac.destination);
                osc.start(); osc.stop(ac.currentTime + 0.05);
            } catch (e) { }
        }

        document.onclick = () => input.focus();
    </script>
</body>

</html>
