<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE OBSERVER // FRAGMENT</title>
    <script src="discovery.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        .eye-container {
            width: 300px;
            height: 300px;
            background: #fff;
            border-radius: 100% 0;
            transform: rotate(45deg);
            position: relative;
            overflow: hidden;
            border: 10px solid #111;
            box-shadow: 0 0 100px rgba(167, 139, 250, 0.2);
            transition: 0.1s;
        }

        .iris {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, #222 20%, #a78bfa 40%, #5b21b6 70%, #000 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .pupil {
            width: 40px;
            height: 40px;
            background: #000;
            border-radius: 50%;
            transition: 0.05s;
        }

        .reflection {
            position: absolute;
            top: 25%;
            left: 25%;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
        }

        .ui {
            position: fixed;
            top: 40px;
            color: rgba(167, 139, 250, 0.5);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.7rem;
            pointer-events: none;
        }

        .exit {
            position: fixed;
            bottom: 40px;
            color: #222;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .exit:hover {
            color: #fff;
        }

        .lid-top,
        .lid-bottom {
            position: absolute;
            width: 200%;
            height: 100%;
            background: #000;
            z-index: 10;
            left: -50%;
            transition: 0.1s;
        }

        .lid-top {
            top: -100%;
        }

        .lid-bottom {
            bottom: -100%;
        }

        .blink .lid-top {
            top: -50%;
        }

        .blink .lid-bottom {
            bottom: -50%;
        }
    </style>
</head>

<body>
    <div class="ui">Target Acquisition: Focused</div>
    <div class="eye-container" id="eye">
        <div class="lid-top"></div>
        <div class="lid-bottom"></div>
        <div class="iris" id="iris">
            <div class="pupil" id="pupil"></div>
            <div class="reflection"></div>
        </div>
    </div>
    <a href="archive.html" class="exit">BREAK_CONTACT</a>

    <script>
        const eye = document.getElementById('eye');
        const iris = document.getElementById('iris');
        const pupil = document.getElementById('pupil');

        window.onmousemove = (e) => {
            const rect = eye.getBoundingClientRect();
            const eyeX = rect.left + rect.width / 2;
            const eyeY = rect.top + rect.height / 2;

            const dx = e.clientX - eyeX;
            const dy = e.clientY - eyeY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx);

            const maxMove = 50;
            const moveX = Math.cos(angle) * Math.min(maxMove, dist / 10);
            const moveY = Math.sin(angle) * Math.min(maxMove, dist / 10);

            iris.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;

            // Pupil dilation
            const dilation = Math.max(20, 60 - dist / 20);
            pupil.style.width = pupil.style.height = `${dilation}px`;
        };

        function blink() {
            eye.classList.add('blink');
            setTimeout(() => eye.classList.remove('blink'), 150);
            setTimeout(blink, 2000 + Math.random() * 5000);
        }

        blink();

        window.onclick = () => {
            eye.style.transform = 'rotate(45deg) scale(1.2)';
            setTimeout(() => eye.style.transform = 'rotate(45deg) scale(1)', 200);
        };
    </script>
</body>

</html>
