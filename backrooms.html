<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms — Level 0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: none;
        }

        body {
            background: #c8b560;
            font-family: 'Courier New', monospace;
            color: #8a7a30;
        }

        /* Wallpaper tile pattern */
        .wallpaper {
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0, 0, 0, 0.06) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0, 0, 0, 0.06) 40px),
                radial-gradient(ellipse at 50% 50%, rgba(200, 181, 96, 0) 60%, rgba(140, 120, 20, 0.15) 100%);
            background-size: 40px 40px, 40px 40px, 100% 100%;
        }

        /* Fluorescent flicker */
        .light-flicker {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: rgba(255, 255, 200, 0.08);
            animation: flicker 8s infinite;
            z-index: 2;
        }

        @keyframes flicker {

            0%,
            2%,
            4%,
            6%,
            100% {
                opacity: 1
            }

            1%,
            3%,
            5% {
                opacity: 0.4
            }

            60%,
            62% {
                opacity: 0.7
            }

            61% {
                opacity: 0.2
            }

            80% {
                opacity: 0.9
            }

            81% {
                opacity: 0.6
            }
        }

        /* Corridor illusion - nested boxes */
        .corridor {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 800px;
            z-index: 1;
        }

        .hall {
            position: absolute;
            border: 3px solid rgba(100, 85, 20, 0.25);
            animation: hallway 12s linear infinite;
        }

        @keyframes hallway {
            0% {
                transform: scale(0.05) translateZ(0);
                opacity: 0;
            }

            20% {
                opacity: 0.8;
            }

            80% {
                opacity: 0.8;
            }

            100% {
                transform: scale(1.4) translateZ(0);
                opacity: 0;
            }
        }

        /* Ceiling light strip */
        .ceiling-strip {
            position: fixed;
            top: 0;
            left: 5%;
            right: 5%;
            height: 12px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 200, 0.6) 30%, rgba(255, 255, 200, 0.6) 70%, transparent);
            filter: blur(4px);
            animation: flicker 8s infinite;
            z-index: 3;
        }

        /* Text */
        #msg {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: rgba(80, 70, 20, 0.8);
            white-space: nowrap;
            line-height: 2;
        }

        #msg.active {
            animation: msgfade 0.5s ease;
        }

        @keyframes msgfade {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(10px)
            }

            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0)
            }
        }

        #enter-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s;
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: rgba(80, 70, 15, 0.7);
            line-height: 2.2;
        }

        #enter-msg.show {
            opacity: 1;
        }

        #back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 20;
            color: rgba(80, 70, 15, 0.4);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        #back:hover {
            color: rgba(80, 70, 15, 0.8);
        }

        .custom-cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(80, 70, 15, 0.5);
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%);
            transition: opacity 0.5s;
        }

        .ambient-dot {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            background: rgba(100, 90, 30, 0.1);
            filter: blur(40px);
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translateY(0)
            }

            100% {
                transform: translateY(-30px)
            }
        }
    </style>
</head>

<body>
    <div class="wallpaper"></div>
    <div class="light-flicker"></div>
    <div class="ceiling-strip"></div>
    <div class="corridor" id="corridor"></div>
    <div class="custom-cursor" id="cursor"></div>
    <a id="back" href="index.html">← find your way back</a>
    <div id="enter-msg"></div>
    <div id="msg"></div>

    <script>
        // Cursor
        const cur = document.getElementById('cursor');
        document.addEventListener('mousemove', e => { cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; });

        // Corridor boxes
        const corridor = document.getElementById('corridor');
        const SIZES = [50, 120, 200, 290, 390, 500, 620, 750, 890, 1040];
        SIZES.forEach((sz, i) => {
            const div = document.createElement('div');
            div.className = 'hall';
            div.style.cssText = `width:${sz}px;height:${sz * 0.7}px;animation-delay:${-i * (12 / SIZES.length)}s;`;
            corridor.appendChild(div);
        });

        // Ambient sound via Web Audio
        try {
            const ac = new AudioContext();
            const hum = ac.createOscillator();
            const gain = ac.createGain();
            const dist = ac.createWaveShaper();

            // Distortion curve
            const curve = new Float32Array(256);
            for (let i = 0; i < 256; i++) { const x = i * 2 / 256 - 1; curve[i] = Math.tanh(x * 2); }
            dist.curve = curve;

            hum.type = 'sine';
            hum.frequency.setValueAtTime(60, ac.currentTime);
            hum.frequency.setValueAtTime(120, ac.currentTime + 0.5);
            gain.gain.setValueAtTime(0, ac.currentTime);
            gain.gain.linearRampToValueAtTime(0.08, ac.currentTime + 3);

            hum.connect(dist); dist.connect(gain); gain.connect(ac.destination);
            hum.start();

            // Random pitch drift
            setInterval(() => {
                hum.frequency.linearRampToValueAtTime(55 + Math.random() * 15, ac.currentTime + 2);
                gain.gain.linearRampToValueAtTime(0.04 + Math.random() * 0.06, ac.currentTime + 2);
            }, 3000);
        } catch (e) { }

        const MESSAGES = [
            "YOU CLIPPED THROUGH THE WALL.",
            "no-clip achieved.",
            "LEVEL 0 — THE BACKROOMS",
            "estimated area: 600 million sq mi.",
            "you are not alone.",
            "DO NOT RUN. DO NOT STOP.",
            "the humming never stops.",
            "you are somewhere between a dream and a hallway.",
            "find a staircase. keep going down.",
            "moist carpet. buzzing lights. stale air.",
            "entity count in this wing: unknown.",
            "you have been here for 0 days, 0 hours, ∞ minutes.",
            "there is no exit on this level.",
            "keep moving. don't think about the sound.",
            "LEVEL 0 HAS NO EXIT.",
        ];

        const msgEl = document.getElementById('msg');
        const enterMsg = document.getElementById('enter-msg');

        let mi = 0;
        function showMsg() {
            msgEl.textContent = MESSAGES[mi % MESSAGES.length];
            msgEl.classList.remove('active');
            void msgEl.offsetWidth;
            msgEl.classList.add('active');
            mi++;
        }

        setTimeout(() => {
            enterMsg.innerHTML = 'YOU HAVE ENTERED<br>THE BACKROOMS<br><span style="font-size:0.7rem;opacity:0.6">LEVEL 0 — THE LOBBY</span>';
            enterMsg.classList.add('show');
            setTimeout(() => { enterMsg.style.opacity = '0'; enterMsg.style.transition = 'opacity 2s'; }, 3000);
        }, 1000);

        showMsg();
        setInterval(showMsg, 5000);
    </script>
</body>

</html>
