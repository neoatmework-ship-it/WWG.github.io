<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | WWG Fragment Archive</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #020205;
            --accent: #a78bfa;
            --locked: #18181b;
            --unlocked: rgba(167, 139, 250, 0.1);
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 80px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            letter-spacing: -1px;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
        }

        .stats {
            margin-top: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .slot {
            aspect-ratio: 1;
            background: var(--locked);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            text-decoration: none;
            color: inherit;
        }

        .slot.unlocked {
            background: var(--unlocked);
            border-color: var(--accent);
            cursor: pointer;
        }

        .slot.unlocked:hover {
            transform: translateY(-5px);
            background: rgba(167, 139, 250, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 10px;
            filter: grayscale(1) opacity(0.2);
            transition: 0.3s;
        }

        .unlocked .icon {
            filter: none;
            opacity: 1;
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #444;
            transition: 0.3s;
        }

        .unlocked .name {
            color: #fff;
        }

        .back-link {
            position: fixed;
            top: 40px;
            left: 40px;
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .back-link:hover {
            color: #fff;
        }

        .empty-hint {
            position: absolute;
            bottom: -40px;
            font-size: 0.7rem;
            color: #444;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← RETURN</a>

    <div class="header">
        <div class="header-content">
            <span class="badge" id="discovery-stats">LOADED fragments // 0 of 20 secure</span>
            <h1>THE ARCHIVE VAULT</h1>
            <p class="desc">A localized mirror of all salvaged fragments. Use the shortcuts to warp back
                to established dimensions.</p>
        </div>
        <div id="guide-cont" style="display:none; margin-top:20px;">
            <a href="cheatsheet.html" class="guide-btn" style="
                background: rgba(167, 139, 250, 0.1);
                border: 1px solid var(--accent);
                color: var(--accent);
                padding: 10px 20px;
                border-radius: 50px;
                text-decoration: none;
                font-family: 'Space Grotesk', sans-serif;
                font-size: 0.8rem;
                font-weight: bold;
                letter-spacing: 1px;
                transition: 0.3s;
                display: inline-block;
            ">VIEW_DISCOVERY_GUIDE</a>
        </div>

        <div class="reset-wrap" style="display:flex; gap:10px; margin-top:20px;">
            <button id="reset-btn" class="reset-btn" style="
                background: rgba(255, 50, 50, 0.1);
                border: 1px solid rgba(255, 50, 50, 0.2);
                color: #ff5555;
                padding: 10px 15px;
                border-radius: 8px;
                font-family: 'Space Grotesk', sans-serif;
                font-size: 0.7rem;
                font-weight: bold;
                letter-spacing: 1px;
                cursor: pointer;
                transition: 0.3s;
            ">RESET_VAULT</button>
        </div>
    </div>

    <div class="grid" id="vault-grid">
        <!-- Slots generated by JS -->
    </div>

    <script src="discovery.js"></script>
    <script>
        const grid = document.getElementById('vault-grid');
        const discoveryStats = document.getElementById('discovery-stats');
        const resetButton = document.getElementById('reset-btn');

        const siteData = {
            'void': { name: 'Void', icon: '🌑' },
            'ghost': { name: 'Ghost', icon: '👻' },
            'classified': { name: 'Classified', icon: '📁' },
            'backrooms': { name: 'Backrooms', icon: '🏨' },
            'limbo': { name: 'Limbo', icon: '⏳' },
            'static': { name: 'Static', icon: '📻' },
            'deep': { name: 'Deep', icon: '🌊' },
            'underground': { name: 'Underground', icon: '🎩' },
            'starlight': { name: 'Starlight', icon: '⭐' },
            'eclipse': { name: 'Eclipse', icon: '🌑' },
            'mirror': { name: 'Mirror', icon: '🪞' },
            'blackhole': { name: 'Blackhole', icon: '🕳️' },
            'chosen': { name: 'Chosen', icon: '🌟', file: 'the-chosen.html' },
            'useful': { name: 'Useful', icon: '🟢', file: 'useful-button.html' },
            'corner': { name: 'Corner', icon: '💽', file: 'dvd-secret.html' },
            'braille': { name: 'Braille', icon: '⠿', file: 'braille-translator.html' },
            'glitch': { name: 'Glitch', icon: '👾', file: 'glitch-text.html' },
            'voidvoid': { name: 'G-Void', icon: '⚠️', file: 'glitch-void.html' },
            'terminal': { name: 'Terminal', icon: '📟' },
            'blueprint': { name: 'Blueprint', icon: '📐' },
            'zenith': { name: 'Zenith', icon: '🧘', file: 'zen-garden.html' },
            'gravity': { name: 'G-Shift', icon: '↕️', file: 'gravity-shift.html' },
            'timeloop': { name: 'Time Loop', icon: '➰', file: 'time-loop.html' },
            'forest': { name: 'Fractal Forest', icon: '🌲', file: 'binary-forest.html' },
            'observer': { name: 'The Observer', icon: '👁️', file: 'the-observer.html' }
        };

        function render() {
            const discovered = Discovery.getDiscovered();
            discoveryStats.innerText = `LOADED fragments // ${discovered.length} of 25 secure`;

            if (Discovery.isCheatsheetUnlocked()) {
                document.getElementById('guide-cont').style.display = 'block';
            }

            grid.innerHTML = '';

            Object.keys(siteData).forEach(id => {
                const data = siteData[id];
                const isUnlocked = discovered.includes(id);

                const slot = document.createElement(isUnlocked ? 'a' : 'div');
                slot.className = `slot ${isUnlocked ? 'unlocked' : ''}`;
                if (isUnlocked) slot.href = data.file || `${id}.html`;

                slot.innerHTML = `
                    <div class="icon">${isUnlocked ? data.icon : '🔒'}</div>
                    <div class="name">${isUnlocked ? data.name : '???'}</div>
                `;

                grid.appendChild(slot);
            });
        }

        resetButton.addEventListener('click', () => {
            if (confirm('CRITICAL: This will purge all salvaged fragments from your local cache. Continue?')) {
                localStorage.removeItem('wwg_discovered_secrets');
                window.location.reload();
            }
        });

        render();
    </script>
</body>

</html>
