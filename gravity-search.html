<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%AA%82%3C%2Ftext%3E%3C%2Fsvg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Search | WWG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #202124;
            --border: #dfe1e5;
            --accent: #4285f4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
        }

        #physics-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .search-ui {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 584px;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .search-box {
            width: 100%;
            height: 48px;
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            background: #fff;
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
            pointer-events: auto;
        }

        .search-box:hover {
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.35);
            border-color: rgba(223, 225, 229, 0);
        }

        input {
            flex: 1;
            height: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            color: var(--text);
            padding-left: 10px;
            background: transparent;
        }

        .logo {
            font-size: 5rem;
            font-weight: 600;
            margin-bottom: 25px;
            letter-spacing: -3px;
            user-select: none;
        }

        .logo span:nth-child(1) {
            color: #4285f4;
        }

        .logo span:nth-child(2) {
            color: #ea4335;
        }

        .logo span:nth-child(3) {
            color: #fbbc05;
        }

        .logo span:nth-child(4) {
            color: #4285f4;
        }

        .logo span:nth-child(5) {
            color: #34a853;
        }

        .logo span:nth-child(6) {
            color: #ea4335;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #70757a;
            font-size: 0.85rem;
            pointer-events: none;
            z-index: 5;
        }

        /* Back Button */
        .wwg-back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4285f4;
            z-index: 99999;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .wwg-back-btn:hover {
            background: #fff;
            transform: scale(1.05) translateX(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .cleaning-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 600;
            color: #ea4335;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 100;
            pointer-events: none;
        }
    </style>
    <!-- Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js"></script>
</head>

<body>

    <a href="index.html" class="wwg-back-btn" title="Back to Gallery">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </a>

    <div class="search-ui">
        <div class="logo">
            <span>G</span><span>r</span><span>a</span><span>v</span><span>i</span><span>t</span><span>y</span>
        </div>
        <div class="search-box">
            <svg focusable="false" style="color:#9aa0a6;fill:#9aa0a6;width:20px;height:20px" viewBox="0 0 24 24">
                <path
                    d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
                </path>
            </svg>
            <input type="text" id="gravity-input" placeholder="Search with physics..." autocomplete="off">
        </div>
    </div>

    <div id="physics-container"></div>
    <div class="hint">Type to generate weight</div>
    <div class="cleaning-msg" id="cleaning-msg">STORAGE FULL. CLEANING...</div>

    <script>
        // --- PHYSICS SETUP ---
        const { Engine, Render, Runner, Bodies, World, Composite, Mouse, MouseConstraint } = Matter;

        const container = document.getElementById('physics-container');
        const engine = Engine.create();
        const world = engine.world;

        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // Walls
        const wallOptions = { isStatic: true, render: { visible: false } };
        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth, 100, wallOptions);
        const leftWall = Bodies.rectangle(-50, window.innerHeight / 2, 100, window.innerHeight, wallOptions);
        const rightWall = Bodies.rectangle(window.innerWidth + 50, window.innerHeight / 2, 100, window.innerHeight, wallOptions);
        World.add(world, [ground, leftWall, rightWall]);

        // Mouse constraint for interaction
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });
        World.add(world, mouseConstraint);

        // --- GAME LOGIC ---
        const input = document.getElementById('gravity-input');
        const cleaningMsg = document.getElementById('cleaning-msg');
        let charBodies = [];
        let totalChars = 0;
        let isCleaning = false;

        const colors = ['#4285f4', '#ea4335', '#fbbc05', '#34a853'];

        input.addEventListener('input', (e) => {
            if (isCleaning) return;

            const val = input.value;
            if (val.length === 0) return;

            const char = val[val.length - 1];
            spawnChar(char);

            // Clear input so user can keeping typing naturally
            input.value = '';

            totalChars++;
            if (totalChars > 150) {
                triggerCleaning();
            }
        });

        function spawnChar(char) {
            const rect = input.getBoundingClientRect();
            const x = rect.left + Math.random() * rect.width;
            const y = rect.top + rect.height / 2;

            const size = 20 + Math.random() * 20;
            const color = colors[Math.floor(Math.random() * colors.length)];

            const charBody = Bodies.rectangle(x, y, size, size, {
                restitution: 0.6,
                friction: 0.1,
                render: {
                    sprite: {
                        // We use a canvas to render the text as a texture
                        texture: createCharTexture(char, size, color)
                    }
                }
            });

            World.add(world, charBody);
            charBodies.push(charBody);
        }

        function createCharTexture(char, size, color) {
            const canvas = document.createElement('canvas');
            canvas.width = size * 2;
            canvas.height = size * 2;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = color;
            ctx.font = `bold ${size}px Inter`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, size, size);

            return canvas.toDataURL();
        }

        function triggerCleaning() {
            if (isCleaning) return;
            isCleaning = true;
            cleaningMsg.style.opacity = 1;

            // Reverse gravity or create a suction point
            engine.world.gravity.y = -2;

            setTimeout(() => {
                cleaningMsg.style.opacity = 0;

                // Redirect or reset
                setTimeout(() => {
                    document.body.style.transition = 'opacity 1s';
                    document.body.style.opacity = 0;
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                }, 1000);
            }, 3000);
        }

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 50 });
            Matter.Body.setPosition(rightWall, { x: window.innerWidth + 50, y: window.innerHeight / 2 });
        });

        // Focus on start
        window.addEventListener('click', () => input.focus());
        input.focus();

    </script>
</body>

</html>
