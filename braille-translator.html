<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braille Translator | WWG</title>
    <style>
        :root {
            --bg: #fdf6e3;
            --text-color: #586e75;
            --accent: #268bd2;
            --paper: #eee8d5;
            --dot-active: #268bd2;
            --dot-inactive: #ddd;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin-top: 50px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            color: var(--accent);
        }

        .input-group {
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border: 2px solid var(--paper);
            border-radius: 10px;
            padding: 15px;
            font-size: 1.2rem;
            color: var(--text-color);
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .output-group {
            background: var(--paper);
            padding: 20px;
            border-radius: 10px;
            min-height: 120px;
            font-size: 2rem;
            word-wrap: break-word;
            margin-bottom: 20px;
            letter-spacing: 5px;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: #1e6ea7;
        }

        .visual-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .braille-char {
            display: inline-grid;
            grid-template-columns: repeat(2, 12px);
            grid-template-rows: repeat(3, 12px);
            gap: 6px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--dot-inactive);
            transition: background 0.2s, transform 0.2s;
        }

        .dot.active {
            background: var(--dot-active);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.1);
            transform: scale(1.1);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-color);
            text-decoration: none;
            font-weight: bold;
            opacity: 0.7;
        }

        .back-link:hover {
            opacity: 1;
        }

        .char-label {
            grid-column: span 2;
            text-align: center;
            font-size: 0.7rem;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← Back to Gallery</a>

    <div class="container">
        <h1>Braille Translator</h1>

        <div class="input-group">
            <textarea id="input" placeholder="Type here to translate to Braille..."></textarea>
        </div>

        <div class="output-group" id="output-text">
            <button class="copy-btn" id="copy">Copy</button>
            <span id="braille-output"></span>
        </div>

        <div class="visual-grid" id="visual-output"></div>
    </div>

    <script>
        const brailleMap = {
            'a': '1', 'b': '12', 'c': '14', 'd': '145', 'e': '15', 'f': '124', 'g': '1245', 'h': '125', 'i': '24', 'j': '245',
            'k': '13', 'l': '123', 'm': '134', 'n': '1345', 'o': '135', 'p': '1234', 'q': '12345', 'r': '1235', 's': '234', 't': '2345',
            'u': '136', 'v': '1236', 'w': '2456', 'x': '1346', 'y': '13456', 'z': '1356',
            '1': '1', '2': '12', '3': '14', '4': '145', '5': '15', '6': '124', '7': '1245', '8': '125', '9': '24', '0': '245',
            ' ': '0', '.': '256', ',': '2', ';': '23', ':': '25', '!': '235', '?': '236', '"': '356', '(': '2356', ')': '2356', '-': '36'
        };

        const unicodeBase = 0x2800;

        function getBrailleUnicode(dots) {
            if (dots === '0') return String.fromCharCode(unicodeBase);
            let val = 0;
            for (let dot of dots) {
                val += Math.pow(2, parseInt(dot) - 1);
            }
            return String.fromCharCode(unicodeBase + val);
        }

        const input = document.getElementById('input');
        const brailleOutput = document.getElementById('braille-output');
        const visualOutput = document.getElementById('visual-output');
        const copyBtn = document.getElementById('copy');

        function update() {
            const text = input.value.toLowerCase();
            let unicodeResult = '';
            visualOutput.innerHTML = '';

            for (let char of text) {
                const dots = brailleMap[char] || '0';
                unicodeResult += getBrailleUnicode(dots);

                // Build visual dot grid
                if (char !== ' ') {
                    const charDiv = document.createElement('div');
                    charDiv.className = 'braille-char';

                    for (let i = 1; i <= 6; i++) {
                        const dot = document.createElement('div');
                        dot.className = 'dot' + (dots.includes(i.toString()) ? ' active' : '');
                        charDiv.appendChild(dot);
                    }

                    const label = document.createElement('div');
                    label.className = 'char-label';
                    label.textContent = char;
                    charDiv.appendChild(label);

                    visualOutput.appendChild(charDiv);
                }
            }

            brailleOutput.textContent = unicodeResult;
        }

        input.addEventListener('input', update);

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(brailleOutput.textContent);
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = 'Copy', 2000);
        };

        // Initial update
        input.value = "Hello World";
        update();
    </script>
</body>

</html>
