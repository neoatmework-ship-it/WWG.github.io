<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAILLE LABS</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #073642;
            --clay: #586e75;
            --dot: #93a1a1;
            --active: #268bd2;
            --glitch: #d33682;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #93a1a1;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .screen {
            max-width: 800px;
            width: 90%;
            padding: 60px;
            background: #002b36;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 10px;
            text-align: center;
            margin-bottom: 40px;
            color: var(--active);
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--clay);
            color: #eee;
            padding: 20px;
            font-family: inherit;
            font-size: 1.2rem;
            resize: none;
            outline: none;
            margin-bottom: 40px;
            border-radius: 4px;
        }

        .braille-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            min-height: 100px;
        }

        .braille-cell {
            display: grid;
            grid-template-columns: repeat(2, 12px);
            grid-template-rows: repeat(3, 12px);
            gap: 8px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            position: relative;
            transition: transform 0.2s, background 0.2s;
        }

        .braille-cell:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.1);
        }

        .dot {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .dot.active {
            background: var(--active);
            box-shadow: 0 0 10px var(--active), inset 0 -2px 4px rgba(0, 0, 0, 0.3);
        }

        .back-link {
            position: fixed;
            top: 40px;
            left: 40px;
            color: var(--clay);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .back-link:hover {
            color: var(--active);
        }

        .lore-glitch {
            color: var(--glitch) !important;
            animation: glitch 0.5s infinite;
        }

        @keyframes glitch {
            50% {
                opacity: 0.5;
                transform: translateX(2px);
            }
        }

        #lore-box {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 3px;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← TERMINAL EXIT</a>

    <div class="screen">
        <h1>TACTILE ENCRYPTOR</h1>

        <textarea id="input" placeholder="INPUT LINGUA FRANCA..." spellcheck="false"></textarea>

        <div class="braille-strip" id="braille-strip">
            <!-- Cells generated here -->
        </div>

        <div id="lore-box">THE VOID ACCEPTS ALL INPUTS.</div>
    </div>

    <script>
        const brailleMap = {
            'a': '1', 'b': '12', 'c': '14', 'd': '145', 'e': '15', 'f': '124', 'g': '1245', 'h': '125', 'i': '24', 'j': '245',
            'k': '13', 'l': '123', 'm': '134', 'n': '1345', 'o': '135', 'p': '1234', 'q': '12345', 'r': '1235', 's': '234', 't': '2345',
            'u': '136', 'v': '1236', 'w': '2456', 'x': '1346', 'y': '13456', 'z': '1356', ' ': '0'
        };

        const input = document.getElementById('input');
        const strip = document.getElementById('braille-strip');
        const loreBox = document.getElementById('lore-box');

        input.oninput = () => {
            const val = input.value.toLowerCase();
            strip.innerHTML = '';

            for (let char of val) {
                const dots = brailleMap[char] || '0';
                createCell(dots);
            }

            // Lore Check
            if (val.includes('classified')) revealLore("SECTOR 7 HAS BEEN COMPROMISED SINCE '83.");
            else if (val.includes('ghost')) revealLore("SOME BITS NEVER TRULY DIE.");
            else loreBox.textContent = "THE VOID ACCEPTS ALL INPUTS.";

            playClick();
        };

        function createCell(dots) {
            const cell = document.createElement('div');
            cell.className = 'braille-cell';
            for (let i = 1; i <= 6; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (dots.includes(i.toString()) ? ' active' : '');
                cell.appendChild(dot);
            }
            strip.appendChild(cell);
        }

        function revealLore(m) {
            loreBox.textContent = m;
            loreBox.classList.add('lore-glitch');
            setTimeout(() => loreBox.classList.remove('lore-glitch'), 3000);
        }

        // Web Audio
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        function playClick() {
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.frequency.setValueAtTime(1000 + Math.random() * 500, ac.currentTime);
            gain.gain.setValueAtTime(0.05, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.05);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(); osc.stop(ac.currentTime + 0.05);
        }

    </script>

</html>
