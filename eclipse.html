<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050000;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #ff0000;
        }

        /* The Black Sun */
        .sun-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            z-index: 2;
        }

        .sun {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 50%;
            box-shadow: 0 0 50px 10px #ff0000, inset 0 0 20px #ff0000;
            position: relative;
            z-index: 2;
            animation: pulse-sun 4s infinite alternate ease-in-out;
        }

        /* Corona / Flares */
        .corona {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.8) 0%, transparent 70%);
            z-index: 1;
            filter: blur(10px);
            animation: rotate-corona 10s linear infinite;
        }

        @keyframes pulse-sun {
            0% {
                box-shadow: 0 0 30px 5px #ff0000, inset 0 0 10px #ff0000;
            }

            100% {
                box-shadow: 0 0 80px 20px #ff0000, inset 0 0 30px #ff0000;
            }
        }

        @keyframes rotate-corona {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1) rotate(180deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) rotate(360deg);
                opacity: 0.8;
            }
        }

        /* Corrupted Grid */
        .grid {
            position: absolute;
            bottom: -50vh;
            left: -50vw;
            width: 200vw;
            height: 100vh;
            background-image:
                linear-gradient(rgba(255, 0, 0, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 0, 0.4) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 2s linear infinite;
            z-index: 1;
            box-shadow: inset 0 100px 100px #050000;
        }

        @keyframes grid-move {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 40px;
            }
        }

        /* Glitched Text */
        .title {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            font-size: 5rem;
            letter-spacing: 20px;
            text-transform: uppercase;
            z-index: 3;
            text-shadow: 4px 0px 0px rgba(255, 0, 0, 0.8), -4px 0px 0px rgba(0, 0, 255, 0.8);
            animation: glitch-skew 3s infinite linear alternate-reverse;
        }

        .title::before,
        .title::after {
            content: 'ECLIPSE';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050000;
        }

        .title::before {
            left: 2px;
            text-shadow: -2px 0 red;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .title::after {
            left: -2px;
            text-shadow: -2px 0 blue;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% {
                clip: rect(10px, 9999px, 86px, 0);
            }

            20% {
                clip: rect(32px, 9999px, 14px, 0);
            }

            40% {
                clip: rect(79px, 9999px, 93px, 0);
            }

            60% {
                clip: rect(5px, 9999px, 23px, 0);
            }

            80% {
                clip: rect(45px, 9999px, 63px, 0);
            }

            100% {
                clip: rect(15px, 9999px, 44px, 0);
            }
        }

        @keyframes glitch-anim2 {
            0% {
                clip: rect(45px, 9999px, 21px, 0);
            }

            20% {
                clip: rect(81px, 9999px, 6px, 0);
            }

            40% {
                clip: rect(12px, 9999px, 85px, 0);
            }

            60% {
                clip: rect(92px, 9999px, 45px, 0);
            }

            80% {
                clip: rect(25px, 9999px, 13px, 0);
            }

            100% {
                clip: rect(55px, 9999px, 66px, 0);
            }
        }

        @keyframes glitch-skew {
            0% {
                transform: skew(0deg);
            }

            10% {
                transform: skew(2deg);
            }

            20% {
                transform: skew(-2deg);
            }

            30% {
                transform: skew(1deg);
            }

            40% {
                transform: skew(0deg);
            }

            100% {
                transform: skew(0deg);
            }
        }

        .back-link {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff0000;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 4px;
            transition: 0.3s;
            z-index: 10;
            opacity: 0.5;
            text-transform: uppercase;
        }

        .back-link:hover {
            opacity: 1;
            text-shadow: 0 0 10px #ff0000;
        }

        /* Static overlay */
        .static {
            position: absolute;
            inset: 0;
            z-index: 20;
            opacity: 0.05;
            pointer-events: none;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }
    </style>
</head>

<body>

    <div class="static"></div>
    <div class="grid"></div>

    <div class="title">ECLIPSE</div>

    <div class="sun-container">
        <div class="corona"></div>
        <div class="sun"></div>
    </div>

    <a href="index.html" class="back-link">Escape the dark</a>

    <script>
        // Intense bass drone Synthesis
        window.addEventListener('click', () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();

            const osc1 = ctx.createOscillator();
            const osc2 = ctx.createOscillator();
            const lfo = ctx.createOscillator();
            const gain = ctx.createGain();
            const filter = ctx.createBiquadFilter();

            osc1.type = 'sawtooth';
            osc1.frequency.value = 40; // Super low E

            osc2.type = 'square';
            osc2.frequency.value = 40.5; // Slight detune for phasing

            lfo.type = 'sine';
            lfo.frequency.value = 0.2; // Slow pulse

            filter.type = 'lowpass';
            filter.frequency.value = 200;

            // Modulate filter cutoff with LFO
            const lfoGain = ctx.createGain();
            lfoGain.gain.value = 100;
            lfo.connect(lfoGain);
            lfoGain.connect(filter.frequency);

            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 3);

            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);

            osc1.start();
            osc2.start();
            lfo.start();
        }, { once: true });
    </script>
</body>

</html>
