<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLAR ECLIPSE</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --exposure: 0;
            --sun-x: 50%;
            --sun-y: 50%;
            --moon-x: 52%;
            --moon-y: 48%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #ff3300;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s;
        }

        canvas#flare-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .sun-system {
            position: relative;
            width: 400px;
            height: 400px;
            z-index: 10;
        }

        .sun-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 100px 40px #ff3300, 0 0 200px 80px rgba(255, 50, 0, 0.2);
            z-index: 5;
        }

        .moon {
            position: absolute;
            width: 210px;
            height: 210px;
            background: #000;
            border-radius: 50%;
            cursor: grab;
            z-index: 15;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
            transition: transform 0.1s;
        }

        .moon:active {
            cursor: grabbing;
            width: 215px;
            height: 215px;
        }

        .ui-layer {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 50;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 15px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .back-link {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 51, 0, 0.3);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            z-index: 50;
        }

        .back-link:hover {
            color: #ff3300;
            text-shadow: 0 0 10px #ff3300;
        }

        #exposure-hud {
            position: fixed;
            top: 40px;
            right: 40px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            opacity: 0.4;
            text-align: right;
        }

        .heat-haze {
            position: fixed;
            inset: 0;
            z-index: 20;
            pointer-events: none;
            backdrop-filter: blur(calc(var(--exposure) * 10px));
            opacity: calc(var(--exposure) * 0.5);
        }
    </style>
</head>

<body>
    <canvas id="flare-canvas"></canvas>
    <div class="heat-haze"></div>

    <div class="ui-layer">
        <h1>ECLIPSE</h1>
        <p style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">DRAG THE MOON TO ALIGN THE TRUTH</p>
    </div>

    <div id="exposure-hud">EXPOSURE: 0.0%<br>TEMP: 5778K</div>

    <div class="sun-system">
        <div class="sun-core"></div>
        <div class="moon" id="moon"></div>
    </div>

    <a href="index.html" class="back-link">← RETURN TO THE GRID</a>

    <script>
        const canvas = document.getElementById('flare-canvas');
        const ctx = canvas.getContext('2d');
        const moon = document.getElementById('moon');
        const hud = document.getElementById('exposure-hud');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let moonPos = { x: width / 2 + 50, y: height / 2 - 20 };
        let isDragging = false;
        let offset = { x: 0, y: 0 };

        moon.addEventListener('mousedown', e => {
            isDragging = true;
            offset.x = e.clientX - moon.offsetLeft;
            offset.y = e.clientY - moon.offsetTop;
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const x = e.clientX - offset.x;
            const y = e.clientY - offset.y;
            moon.style.left = x + 'px';
            moon.style.top = y + 'px';
            moonPos.x = x + 105;
            moonPos.y = y + 105;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        // Initial Position
        moon.style.left = (width / 2 - 50) + 'px';
        moon.style.top = (height / 2 - 120) + 'px';

        const flares = [];

        function drawEclipse() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            const dx = moonPos.x - width / 2;
            const dy = moonPos.y - height / 2;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Alignment / Exposure
            const alignment = Math.max(0, 1 - (dist / 150));
            const exposure = alignment > 0.95 ? (1 - (alignment - 0.95) * 20) : 1;

            hud.innerHTML = `EXPOSURE: ${(alignment * 100).toFixed(1)}%<br>ALIGNMENT: ${alignment > 0.99 ? "TOTALITY" : "PARTIAL"}`;
            document.documentElement.style.setProperty('--exposure', alignment);

            // Draw Sun Glow
            const grd = ctx.createRadialGradient(width / 2, height / 2, 80, width / 2, height / 2, 300);
            grd.addColorStop(0, `rgba(255, 50, 0, ${0.8 * exposure})`);
            grd.addColorStop(1, 'transparent');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, width, height);

            // Flares
            if (Math.random() < 0.3) {
                const angle = Math.random() * Math.PI * 2;
                flares.push({
                    x: width / 2 + Math.cos(angle) * 100,
                    y: height / 2 + Math.sin(angle) * 100,
                    vx: Math.cos(angle) * (1 + Math.random() * 2),
                    vy: Math.sin(angle) * (1 + Math.random() * 2),
                    life: 1,
                    size: 2 + Math.random() * 5
                });
            }

            flares.forEach((f, i) => {
                f.x += f.vx;
                f.y += f.vy;
                f.life -= 0.01;
                if (f.life <= 0) flares.splice(i, 1);

                // Flare reactivity to moon
                const mdx = f.x - moonPos.x;
                const mdy = f.y - moonPos.y;
                const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
                if (mdist < 105) f.life = 0; // Moon blocks flares

                ctx.fillStyle = `rgba(255, 100, 0, ${f.life})`;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(drawEclipse);
        }

        drawEclipse();

        // Audio
        let audioCtx;
        function playDrone() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(40, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();

                window.addEventListener('mousemove', () => {
                    const alignment = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--exposure'));
                    osc.frequency.setTargetAtTime(40 + alignment * 20, audioCtx.currentTime, 0.1);
                });
            }
        }
        window.addEventListener('mousedown', playDrone, { once: true });

    </script>
</body>

</html>
