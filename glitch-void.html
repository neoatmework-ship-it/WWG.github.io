<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATAL_ERROR: GLITCH_VOID</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --glitch-pink: #ff00ff;
            --glitch-cyan: #00ffff;
            --glitch-green: #00ff41;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas#glitch-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .ui-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--glitch-pink);
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.5);
            max-width: 500px;
            transition: transform 0.1s;
            pointer-events: auto;
        }

        h1 {
            font-size: 3rem;
            color: var(--glitch-cyan);
            text-shadow: 3px 3px var(--glitch-pink);
            margin-bottom: 20px;
            animation: jitter 0.1s infinite;
        }

        @keyframes jitter {
            0% {
                transform: translate(0);
            }

            50% {
                transform: translate(2px, -2px);
            }

            100% {
                transform: translate(-2px, 2px);
            }
        }

        .status-box {
            font-size: 0.9rem;
            line-height: 1.6;
            text-align: left;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
            margin-top: 20px;
        }

        .reboot-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 30px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: 0.3s;
        }

        .reboot-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px #fff;
        }

        .scanline {
            position: fixed;
            width: 100%;
            height: 10px;
            background: rgba(0, 255, 65, 0.1);
            z-index: 20;
            pointer-events: none;
            animation: sweep 5s linear infinite;
        }

        @keyframes sweep {
            from {
                top: -10%;
            }

            to {
                top: 110%;
            }
        }
    </style>
</head>

<body>
    <canvas id="glitch-canvas"></canvas>
    <div class="scanline"></div>

    <div class="ui-overlay" id="ui">
        <h1>0xFF_VOID</h1>
        <div class="status-box">
            STATUS: [MAX_ENTROPY]<br>
            INTEGRITY: <span id="integrity">0.04%</span><br>
            THREAT_LVL: OMEGA<br>
            <br>
            <span style="color: var(--glitch-green)">> PAIN_CORRUPTION_INTO_THE_BUFFER</span>
        </div>
        <a href="index.html" class="reboot-btn">REBOOT_SYS</a>
    </div>

    <script>
        const canvas = document.getElementById('glitch-canvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const integrity = document.getElementById('integrity');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let corruption = 0;
        let brushSize = 50;

        // Corruption Brush
        window.onmousemove = (e) => {
            if (Math.random() > 0.5) {
                const x = e.clientX;
                const y = e.clientY;
                ctx.fillStyle = Math.random() > 0.5 ? '#ff00ff' : '#00ffff';
                ctx.globalAlpha = 0.5;
                ctx.fillRect(x - brushSize / 2, y - brushSize / 2, brushSize, brushSize);
                ctx.globalAlpha = 1;

                corruption += 0.01;
                integrity.textContent = Math.max(0, (0.04 - corruption * 0.001)).toFixed(4) + '%';
            }
        };

        function draw() {
            // Periodic screen tear
            if (Math.random() > 0.95) {
                const sy = Math.random() * height;
                const sh = Math.random() * 100;
                const sx = Math.random() * 40 - 20;
                ctx.drawImage(canvas, 0, sy, width, sh, sx, sy, width, sh);
            }

            // RGB Split effect occasionally
            if (Math.random() > 0.98) {
                ctx.globalCompositeOperation = 'screen';
                ctx.drawImage(canvas, 10, 0);
                ctx.drawImage(canvas, -10, 0);
                ctx.globalCompositeOperation = 'source-over';
            }

            // Random Noise
            if (Math.random() > 0.8) {
                for (let i = 0; i < 5; i++) {
                    ctx.fillStyle = `rgba(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255}, 0.1)`;
                    ctx.fillRect(Math.random() * width, Math.random() * height, Math.random() * 200, 2);
                }
            }

            // UI Jitter
            ui.style.transform = `translate(${(Math.random() - 0.5) * 10}px, ${(Math.random() - 0.5) * 10}px) skew(${(Math.random() - 0.5) * 10}deg)`;

            requestAnimationFrame(draw);
        }
        draw();

        // Audio Glitch
        const ac = new AudioContext();
        function playError() {
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(50 + Math.random() * 100, ac.currentTime);
            gain.gain.setValueAtTime(0.01, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(); osc.stop(ac.currentTime + 0.1);
        }
        window.onclick = playError;

    </script>
</body>

</html>
