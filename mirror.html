<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROKEN MIRROR</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --recursion-depth: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: invert(1) hue-rotate(180deg);
        }

        .layer {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: transform 0.3s;
        }

        /* Recursive Frame */
        .mirror-frame {
            width: 80%;
            height: 80%;
            border: 20px solid #222;
            background: #eee;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
            transform: scaleX(-1);
        }

        .recursion-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        iframe {
            width: 60%;
            height: 60%;
            border: 10px solid #444;
            pointer-events: none;
            opacity: 0.8;
        }

        .shatter-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }

        .shard {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.1);
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.5s, opacity 0.5s;
        }

        .shard:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .ui-label {
            position: fixed;
            top: 40px;
            left: 40px;
            font-size: 0.7rem;
            letter-spacing: 5px;
            transform: scaleX(-1);
            opacity: 0.5;
        }

        .back-link {
            position: fixed;
            bottom: 40px;
            right: 40px;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            z-index: 200;
            transform: scaleX(-1);
        }

        .back-link:hover {
            color: #000;
        }

        .ghost-flicker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: 0;
            }

            50% {
                opacity: 0.2;
            }
        }
    </style>
</head>

<body>
    <div class="ui-label">REFLECTION INSTANCE // RECURSIVE</div>
    <a href="index.html" class="back-link">← EXIT MIRROR</a>

    <div class="mirror-frame" id="frame">
        <div class="recursion-content">
            <h1 style="font-size: 3rem; margin-bottom: 20px; letter-spacing: -2px;">THE MIRROR</h1>
            <p style="opacity: 0.4; margin-bottom: 40px;">Deep within the glass, the gallery reflects itself infinitely.
            </p>

            <!-- Recursion Simulation -->
            <div
                style="width: 60%; height: 60%; border: 15px solid #333; display: flex; align-items: center; justify-content: center; background: #ddd;">
                <div
                    style="width: 60%; height: 60%; border: 10px solid #444; display: flex; align-items: center; justify-content: center; background: #ccc;">
                    <div style="width: 60%; height: 60%; border: 5px solid #555; background: #bbb;"></div>
                </div>
            </div>

            <div class="ghost-flicker" id="ghost">👻</div>
        </div>
        <div class="shatter-overlay" id="shatter-layer"></div>
    </div>

    <script>
        const frame = document.getElementById('frame');
        const shatterLayer = document.getElementById('shatter-layer');
        const ghost = document.getElementById('ghost');

        // Create initial shards
        function createShards() {
            for (let i = 0; i < 15; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                const w = 150 + Math.random() * 200;
                const h = 150 + Math.random() * 200;
                shard.style.width = w + 'px';
                shard.style.height = h + 'px';
                shard.style.left = Math.random() * 100 + '%';
                shard.style.top = Math.random() * 100 + '%';
                shard.style.clipPath = `polygon(${Math.random() * 100}% 0%, 100% ${Math.random() * 100}%, ${Math.random() * 100}% 100%, 0% ${Math.random() * 100}%)`;

                shard.onclick = (e) => {
                    e.stopPropagation();
                    shard.style.transform = `translate(${(Math.random() - 0.5) * 200}px, ${(Math.random() - 0.5) * 200}px) rotate(${(Math.random() - 0.5) * 90}deg)`;
                    shard.style.opacity = '0';
                    playShatter();
                    setTimeout(() => shard.remove(), 500);
                };
                shatterLayer.appendChild(shard);
            }
        }
        createShards();

        // Ghost Flicker
        setInterval(() => {
            if (Math.random() < 0.1) {
                ghost.style.animation = 'flicker 0.2s';
                setTimeout(() => ghost.style.animation = '', 200);
            }
        }, 5000);

        // Audio Shatter
        let audioCtx;
        function playShatter() {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const noise = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100 + Math.random() * 1000, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

    </script>
</body>

</html>
