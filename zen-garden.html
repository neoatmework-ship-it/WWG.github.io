<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Sanctuary</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --accent: #1a1a1a;
            --pale: #e9ecef;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--accent);
        }

        canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .ui-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 20px;
            text-transform: uppercase;
            font-size: 1.2rem;
            margin: 0;
            opacity: 0.6;
        }

        .status {
            font-size: 0.6rem;
            letter-spacing: 5px;
            margin-top: 20px;
            opacity: 0.3;
            text-transform: uppercase;
        }

        .home-link {
            position: fixed;
            bottom: 40px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.2;
            transition: opacity 0.5s;
            pointer-events: auto;
            text-transform: uppercase;
        }

        .home-link:hover {
            opacity: 0.8;
        }

        #zen-indicator {
            position: fixed;
            top: 40px;
            width: 100px;
            height: 1px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 1s;
        }
    </style>
</head>

<body>
    <canvas id="zen-canvas"></canvas>

    <div class="ui-overlay" id="ui">
        <h1>Zenith</h1>
        <div class="status" id="status">Adjusting Frequency</div>
    </div>

    <div id="zen-indicator"></div>

    <a href="index.html" class="home-link">Return to Core</a>

    <script>
        const canvas = document.getElementById('zen-canvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const status = document.getElementById('status');

        let w, h;
        let particles = [];
        let mouse = { x: -100, y: -100 };
        let lastMove = Date.now();
        let zenMode = false;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Mouse influence
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    this.x -= dx * 0.01;
                    this.y -= dy * 0.01;
                }

                if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(26, 26, 26, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, w, h);

            // Draw connections
            particles.forEach((p1, i) => {
                p1.update();
                p1.draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(26, 26, 26, ${0.1 * (1 - dist / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });

            // Zen check
            if (Date.now() - lastMove > 5000 && !zenMode) {
                enterZen();
            }

            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            lastMove = Date.now();
            if (zenMode) exitZen();
        });

        function enterZen() {
            zenMode = true;
            ui.style.opacity = '0';
            document.body.style.backgroundColor = '#fff';
            status.innerText = 'Sanctuary Active';
        }

        function exitZen() {
            zenMode = false;
            ui.style.opacity = '1';
            document.body.style.backgroundColor = '#fdfdfd';
            status.innerText = 'Monitoring Presence';
        }
    </script>
</body>

</html>
