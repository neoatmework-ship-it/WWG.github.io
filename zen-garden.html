<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Sanctuary | Sanctuary of Stillness</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --text: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 2s ease, filter 2s ease;
        }

        canvas#zen-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .ui-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            opacity: 0.5;
            transition: opacity 1s;
        }

        h1 {
            font-size: 0.8rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .instruction {
            margin-top: 20px;
            font-size: 0.6rem;
            letter-spacing: 5px;
            opacity: 0.4;
        }

        .back-link {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text);
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 3px;
            opacity: 0.2;
            z-index: 50;
            transition: 0.3s;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        .bloom body {
            background: #000;
            filter: invert(1);
        }
    </style>
</head>

<body>
    <canvas id="zen-canvas"></canvas>
    <a href="index.html" class="back-link">← EXIT_SANCTUARY</a>

    <div class="ui-overlay" id="ui">
        <h1>ZENITH</h1>
        <div class="instruction">DO NOTHING.</div>
    </div>

    <script>
        const canvas = document.getElementById('zen-canvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let shapes = [];
        let lastAction = Date.now();
        let blooming = false;

        class Shape {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.points = 3 + Math.floor(Math.random() * 5);
                this.life = 1;
            }

            update() {
                this.radius += 2;
                this.life -= 0.005;
            }

            draw() {
                ctx.beginPath();
                for (let i = 0; i <= this.points; i++) {
                    const angle = (i / this.points) * Math.PI * 2;
                    const sx = this.x + Math.cos(angle) * this.radius;
                    const sy = this.y + Math.sin(angle) * this.radius;
                    if (i === 0) ctx.moveTo(sx, sy);
                    else ctx.lineTo(sx, sy);
                }
                ctx.strokeStyle = `rgba(26, 26, 26, ${this.life})`;
                ctx.stroke();
            }
        }

        window.onmousedown = (e) => {
            shapes.push(new Shape(e.clientX, e.clientY));
            lastAction = Date.now();
            if (blooming) stopBloom();
            playResonance();
        };

        window.onmousemove = () => {
            lastAction = Date.now();
            if (blooming) stopBloom();
        };

        function startBloom() {
            blooming = true;
            document.documentElement.classList.add('bloom');
            ui.style.opacity = '1';
            ui.querySelector('h1').textContent = "BLOOMING";
        }

        function stopBloom() {
            blooming = false;
            document.documentElement.classList.remove('bloom');
            ui.style.opacity = '0.5';
            ui.querySelector('h1').textContent = "ZENITH";
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);

            shapes.forEach((s, i) => {
                s.update();
                s.draw();
                if (s.life <= 0) shapes.splice(i, 1);
            });

            if (Date.now() - lastAction > 10000 && !blooming) {
                startBloom();
            }

            requestAnimationFrame(loop);
        }
        loop();

        // Audio
        const ac = new AudioContext();
        function playResonance() {
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.frequency.setValueAtTime(220 + Math.random() * 220, ac.currentTime);
            gain.gain.setValueAtTime(0.05, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 3);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(); osc.stop(ac.currentTime + 3);
        }
    </script>
</body>

</html>
