<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Sanctuary</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --circle: rgba(0, 0, 0, 0.03);
            --accent: #adb5bd;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            transition: background-color 2s ease;
        }

        .container {
            position: relative;
            text-align: center;
        }

        .circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid var(--accent);
            border-radius: 50%;
            animation: pulse 10s infinite ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                width: 300px;
                height: 300px;
                opacity: 0.1;
            }

            50% {
                width: 500px;
                height: 500px;
                opacity: 0.5;
            }
        }

        .text {
            position: relative;
            z-index: 10;
            color: var(--accent);
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            animation: fadeIn 3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                letter-spacing: 15px;
            }

            to {
                opacity: 1;
                letter-spacing: 5px;
            }
        }

        .home-link {
            position: fixed;
            bottom: 40px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.6rem;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .home-link:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="circle" style="animation-delay: 0s;"></div>
        <div class="circle" style="animation-delay: -2s; width: 400px; height: 400px;"></div>
        <div class="circle" style="animation-delay: -4s; width: 200px; height: 200px;"></div>
        <div class="text">Zenith</div>
    </div>

    <a href="index.html" class="home-link">RETURN</a>

    <script>
        // Subtle color shifting
        let hue = 0;
        function shift() {
            document.body.style.backgroundColor = `hsl(${hue}, 5%, 95%)`;
            hue = (hue + 0.1) % 360;
            requestAnimationFrame(shift);
        }
        shift();
    </script>
</body>

</html>
