<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%A4%94%3C%2Ftext%3E%3C%2Fsvg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Suggest | WWG</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #202124;
            --border: #dfe1e5;
            --shadow: 0 4px 6px rgba(32, 33, 36, 0.28);
            --hover-bg: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 15vh;
        }

        .logo {
            font-size: 3rem;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: -2px;
            user-select: none;
        }

        .logo span:nth-child(1) {
            color: #4285f4;
        }

        .logo span:nth-child(2) {
            color: #ea4335;
        }

        .logo span:nth-child(3) {
            color: #fbbc05;
        }

        .logo span:nth-child(4) {
            color: #4285f4;
        }

        .logo span:nth-child(5) {
            color: #34a853;
        }

        .logo span:nth-child(6) {
            color: #ea4335;
        }

        .search-container {
            width: 90%;
            max-width: 584px;
            position: relative;
        }

        .search-box {
            display: flex;
            align-items: center;
            padding: 0 14px;
            height: 48px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: box-shadow 0.2s;
        }

        .search-box:focus-within {
            box-shadow: var(--shadow);
            border-color: rgba(223, 225, 229, 0);
        }

        #search-input {
            flex: 1;
            height: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 0 10px;
        }

        .dropdown {
            position: absolute;
            top: 48px;
            left: 0;
            width: 100%;
            background: #fff;
            border: 1px solid var(--border);
            border-top: none;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: var(--shadow);
            display: none;
            max-height: 400px;
            overflow-y: auto;
            z-index: 100;
        }

        .suggestion {
            padding: 10px 48px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .suggestion:hover {
            background-color: var(--hover-bg);
        }

        .suggestion-icon {
            color: #9aa0a6;
            width: 16px;
            height: 16px;
        }

        /* Back Button */
        .wwg-back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4285f4;
            z-index: 99999;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .wwg-back-btn:hover {
            background: #fff;
            transform: scale(1.05) translateX(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .footer-text {
            position: fixed;
            bottom: 20px;
            color: #70757a;
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #dadce0;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <a href="index.html" class="wwg-back-btn" title="Back to Gallery">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </a>

    <div class="logo">
        <span>S</span><span>u</span><span>g</span><span>g</span><span>e</span><span>s</span><span>t</span>
    </div>

    <div class="search-container">
        <div class="search-box">
            <svg focusable="false" style="color:#9aa0a6;fill:#9aa0a6;width:20px;height:20px" viewBox="0 0 24 24">
                <path
                    d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
                </path>
            </svg>
            <input type="text" id="search-input" placeholder="Is it real?" autocomplete="off">
        </div>
        <div class="dropdown" id="dropdown">
            <!-- Suggestions injected here -->
        </div>
    </div>

    <div class="footer-text">Powered by the Collective Unconscious™</div>

    <script>
        const input = document.getElementById('search-input');
        const dropdown = document.getElementById('dropdown');

        const starters = [
            "how to remember ",
            "is it legal to ",
            "can my microwave ",
            "why do my ",
            "should I talk to ",
            "the truth about ",
            "where did all the ",
            "who stole my ",
            "does my reflection ",
            "when will the ",
            "am I currently ",
            "do humans actually ",
            "is it normal to feel "
        ];

        const ends = [
            "the color of silence",
            "the shadows in the corner",
            "the taste of Wednesday",
            "the smell of static",
            "my third eye",
            "the neighbor's cat who knows too much",
            "the missing hour from yesterday",
            "the voices in the radiator",
            "the pattern in the marble",
            "the secrets of the basement",
            "the invisible birds",
            "the glitch in the sky",
            "the person standing behind me"
        ];

        const weirdSuggestions = [
            "click here to wake up",
            "why are there 13 months?",
            "is the internet just one person?",
            "how to exit the browser properly",
            "who is watching through the webcam?",
            "the moon is a holographic projection",
            "do not look at the sun today",
            "everything is fine. everything is fine.",
            "the simulation is lagging",
            "find the hidden door in index.html"
        ];

        function generateSuggestion(query) {
            const s = starters[Math.floor(Math.random() * starters.length)];
            const e = ends[Math.floor(Math.random() * ends.length)];
            return query + (query.length > 0 ? " " : "") + s + e;
        }

        function populateDropdown(query) {
            dropdown.innerHTML = '';

            // Add some semi-realistic weirdness
            for (let i = 0; i < 20; i++) {
                const text = i < 5 ? (query + " " + weirdSuggestions[Math.floor(Math.random() * weirdSuggestions.length)]) : generateSuggestion(query);
                const div = document.createElement('div');
                div.className = 'suggestion';
                div.innerHTML = `
                    <svg class="suggestion-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                    <span>${text}</span>
                `;

                div.onclick = () => {
                    if (text.includes("wake up") || text.includes("exit")) {
                        window.location.href = 'void-search.html';
                    } else if (text.includes("index.html")) {
                        window.location.href = 'index.html';
                    } else {
                        input.value = text;
                        populateDropdown(text);
                    }
                };

                dropdown.appendChild(div);
            }

            dropdown.style.display = 'block';
        }

        input.addEventListener('input', (e) => {
            const query = input.value;
            if (query.length > 0) {
                populateDropdown(query);
            } else {
                dropdown.style.display = 'none';
            }
        });

        // Hide dropdown when clicking away
        document.addEventListener('click', (e) => {
            if (!dropdown.contains(e.target) && e.target !== input) {
                dropdown.style.display = 'none';
            }
        });

        // Focus on start
        input.focus();
    </script>
</body>

</html>
