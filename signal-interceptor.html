<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Interceptor | WWG</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050508;
            color: #00ff99;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 14px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            color: #00ff99;
            text-shadow: 0 0 20px #00ff9960;
        }

        .scope-wrap {
            position: relative;
            width: min(560px, 95vw);
            background: #020804;
            border: 2px solid #00ff3320;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px #00ff3310;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 29px, #00ff1108 30px), repeating-linear-gradient(90deg, transparent, transparent 29px, #00ff1108 30px);
        }

        #scope {
            display: block;
        }

        .panel {
            background: rgba(0, 255, 100, 0.03);
            border: 1px solid #00ff3320;
            border-radius: 10px;
            padding: 14px;
            width: min(560px, 95vw);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .knob {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 100px;
        }

        .knob label {
            font-size: 0.6rem;
            color: #00ff9960;
            letter-spacing: 1px;
        }

        .knob input {
            accent-color: #00ff99;
            width: 100%;
        }

        .knob .v {
            font-size: 0.72rem;
            color: #00ff99;
        }

        .sbtn {
            padding: 5px 10px;
            border: 1px solid #00ff3340;
            background: transparent;
            color: #00ff9980;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .sbtn.active,
        .sbtn:hover {
            background: #00ff1520;
            border-color: #00ff99;
            color: #00ff99;
        }

        #decode {
            font-size: 0.72rem;
            border: 1px solid #00ff3330;
            border-radius: 8px;
            padding: 12px;
            background: #020a04;
            min-height: 70px;
            color: #00ff99;
            line-height: 1.7;
            width: min(560px, 95vw);
            white-space: pre-wrap;
        }

        .statusbar {
            display: flex;
            gap: 14px;
            font-size: 0.62rem;
            color: #00ff9960;
            align-items: center;
        }

        .led {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff99;
            box-shadow: 0 0 5px #00ff99;
            display: inline-block;
        }

        .scan {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(0, 255, 150, 0.05);
            pointer-events: none;
            animation: sc 6s linear infinite;
        }

        @keyframes sc {
            0% {
                top: -2px
            }

            100% {
                top: 100%
            }
        }

        a.back {
            color: #00ff9960;
            text-decoration: none;
            font-size: 0.82rem;
            align-self: flex-start;
            font-family: 'Space Grotesk', sans-serif;
        }

        a.back:hover {
            color: #00ff99;
        }
    </style>
</head>

<body>
    <a class="back" href="index.html">← Gallery</a>
    <h1>📡 Signal Interceptor</h1>
    <div class="scope-wrap">
        <canvas id="scope"></canvas>
        <div class="grid-overlay"></div>
        <div class="scan"></div>
    </div>
    <div class="panel">
        <div class="row">
            <div class="knob"><label>FREQUENCY MHz</label><input type="range" id="freq" min="88" max="108" value="98"
                    step="0.1"><span class="v" id="fv">98.0 MHz</span></div>
            <div class="knob"><label>GAIN</label><input type="range" id="gain" min="10" max="100" value="60"><span
                    class="v" id="gv">60%</span></div>
            <div class="knob"><label>NOISE</label><input type="range" id="noise" min="0" max="100" value="30"><span
                    class="v" id="nv">30%</span></div>
        </div>
        <div class="row" id="sig-btns">
            <button class="sbtn active" data-s="sine">SINE</button>
            <button class="sbtn" data-s="square">SQUARE</button>
            <button class="sbtn" data-s="saw">SAW</button>
            <button class="sbtn" data-s="am">AM MOD</button>
            <button class="sbtn" data-s="fm">FM MOD</button>
            <button class="sbtn" data-s="noise">STATIC</button>
            <button class="sbtn" data-s="pulse">PULSE</button>
        </div>
        <div class="statusbar">
            <span><span class="led" id="led"></span> RX ACTIVE</span>
            <span id="str">SIGNAL: ████░░ 70%</span>
            <span>LOCK: ACQUIRED</span>
        </div>
    </div>
    <div id="decode">INTERCEPTING TRANSMISSION...</div>

    <script>
        const cvs = document.getElementById('scope');
        const ctx = cvs.getContext('2d');
        const W = Math.min(560, window.innerWidth - 40);
        const H = Math.round(W * 0.38);
        cvs.width = W; cvs.height = H;

        let sig = 'sine', t = 0;
        const freqEl = document.getElementById('freq');
        const gainEl = document.getElementById('gain');
        const noiseEl = document.getElementById('noise');
        freqEl.addEventListener('input', () => {
            document.getElementById('fv').textContent = parseFloat(freqEl.value).toFixed(1) + ' MHz';
            newMsg();
            check1037();
        });
        gainEl.addEventListener('input', () => document.getElementById('gv').textContent = gainEl.value + '%');
        let staticTimer = null;
        noiseEl.addEventListener('input', () => {
            document.getElementById('nv').textContent = noiseEl.value + '%';
            if (noiseEl.value >= 100) {
                if (!staticTimer) {
                    staticTimer = setTimeout(() => {
                        document.body.style.transition = 'opacity 2s';
                        document.body.style.opacity = '0';
                        setTimeout(() => window.location.href = 'static.html', 2000);
                    }, 5000);
                }
            } else {
                clearTimeout(staticTimer);
                staticTimer = null;
            }
        });
        document.getElementById('sig-btns').querySelectorAll('.sbtn').forEach(b => {
            b.addEventListener('click', () => { document.querySelectorAll('.sbtn').forEach(x => x.classList.remove('active')); b.classList.add('active'); sig = b.dataset.s; });
        });

        function sampleWave(x) {
            const f = (parseFloat(freqEl.value) - 88) / 20 * 8 + 1;
            const g = gainEl.value / 100;
            const n = (Math.random() - 0.5) * 2 * (noiseEl.value / 100);
            let s;
            if (sig === 'sine') s = Math.sin(x * f * 0.15);
            else if (sig === 'square') s = Math.sign(Math.sin(x * f * 0.15));
            else if (sig === 'saw') s = ((x * f * 0.08) % (2 * Math.PI)) / Math.PI - 1;
            else if (sig === 'am') s = Math.sin(x * f * 0.15) * (0.5 + 0.5 * Math.sin(x * 0.02));
            else if (sig === 'fm') s = Math.sin(x * f * 0.15 + Math.sin(x * 0.03) * 4);
            else if (sig === 'noise') s = (Math.random() - 0.5) * 2;
            else if (sig === 'pulse') s = (x * f * 0.12 % (2 * Math.PI)) < 0.4 ? 1 : -0.3;
            return s * g + n;
        }

        function drawScope() {
            ctx.fillStyle = 'rgba(2,8,4,0.3)';
            ctx.fillRect(0, 0, W, H);
            ctx.strokeStyle = 'rgba(0,255,100,0.06)'; ctx.lineWidth = 1;
            for (let gx = 0; gx <= W; gx += W / 8) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
            for (let gy = 0; gy <= H; gy += H / 4) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
            ctx.strokeStyle = 'rgba(0,255,100,0.15)'; ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke();
            ctx.strokeStyle = '#00ff99'; ctx.lineWidth = 1.5; ctx.shadowColor = '#00ff99'; ctx.shadowBlur = 7;
            ctx.beginPath();
            for (let px = 0; px < W; px++) {
                const sv = sampleWave(t + px * 0.5);
                const sy = H / 2 - sv * (H * 0.38);
                px === 0 ? ctx.moveTo(px, sy) : ctx.lineTo(px, sy);
            }
            ctx.stroke(); ctx.shadowBlur = 0;
            t += 2;
        }

        // Decoding
        const MSGS = [
            'SENDER: UNIT-7 :: ALL UNITS REPORT SECTOR 9 AT 0300',
            'THIS IS TEST SIGNAL ALPHA-NINER :: TRANSMISSION NOMINAL',
            'COORDINATES 51.5074°N 0.1278°W :: PACKAGE DELIVERED',
            'THE CAKE IS A LIE :: REPEAT :: THE CAKE IS A LIE',
            '...-- --- ... :: SOS :: VESSEL IN DISTRESS :: GRID 4-7',
            'OPERATION NIGHTFALL IS GO :: CONFIRM ON FREQ 103.7',
            'ANOMALY DETECTED :: AGENTS STAND BY FOR EXTRACTION',
            'ERROR: MESSAGE CORRUPTED :: RETRANSMITTING IN 3...2...1...',
            'THIS FREQUENCY IS MONITORED :: CEASE TRANSMISSION',
            'SIGNAL ORIGIN UNKNOWN :: DECRYPTION KEY MISMATCH',
            // [HIDDEN] — hint transmissions
            '...VOID PROTOCOL DETECTED :: IF YOU CAN READ THIS :: YOU KNOW WHAT TO SEARCH...',
            'AGENT E-1983 STATUS: ACTIVE :: THE GHOST STILL TRANSMITS :: CHECK THE GALLERY SEARCH BAR',
            'DOCUMENT WWG-7749-DELTA LEAKED :: SEARCH "CLASSIFIED" TO ACCESS :: LEAVE NO TRACE',
        ];
        const dec = document.getElementById('decode');
        let cur = '', ci = 0, ledState = false;

        function newMsg() { cur = MSGS[Math.floor(Math.random() * MSGS.length)]; ci = 0; }
        newMsg();

        let lastChar = 0, lastLed = 0;
        function loop(ts) {
            drawScope();
            if (ts - lastChar > 55) {
                lastChar = ts;
                if (ci < cur.length) { dec.textContent += cur[ci++]; if (dec.textContent.length > 400) dec.textContent = dec.textContent.slice(-300); }
                else if (ts - lastChar > 2500) { dec.textContent += '\n─── NEW SIGNAL ───\n'; newMsg(); }
            }
            if (ts - lastLed > 400) { lastLed = ts; ledState = !ledState; document.getElementById('led').style.opacity = ledState ? '1' : '0.3'; }
            const noise = noiseEl.value;
            const bars = Math.max(1, Math.round((100 - noise) / 17));
            document.getElementById('str').textContent = 'SIGNAL: ' + '█'.repeat(bars) + '░'.repeat(6 - bars) + ' ' + (100 - noise) + '%';
            requestAnimationFrame(loop);
        }

        // Secret: tune to 103.7 MHz for 3 seconds
        let freqTimer = null, freqDone = false;
        function check1037() {
            const f = parseFloat(freqEl.value);
            if (Math.abs(f - 103.7) < 0.06) {
                if (!freqTimer && !freqDone) freqTimer = setTimeout(showFreqDoor, 3000);
            } else {
                clearTimeout(freqTimer); freqTimer = null;
            }
        }
        function showFreqDoor() {
            freqDone = true;
            const d = document.createElement('div');
            d.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:200;background:rgba(34,211,238,0.08);border:1px solid #22d3ee60;border-radius:6px;padding:10px 18px;font-size:0.7rem;color:#22d3ee;letter-spacing:2px;cursor:pointer;font-family:"Share Tech Mono",monospace;';
            d.textContent = '\u25b6 FREQUENCY LOCKED \u2014 TUNE IN';
            let v = true; setInterval(() => { d.style.opacity = (v = !v) ? '1' : '0.4'; }, 700);
            d.addEventListener('click', () => { document.body.style.opacity = '0'; document.body.style.transition = 'opacity 0.6s'; setTimeout(() => window.location.href = 'frequency.html', 600); });
            document.body.appendChild(d);
        }

        requestAnimationFrame(loop);
    </script>

<style>
.wwg-nav {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 99999;
}
.wwg-nav a {
    background: rgba(10, 10, 15, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #a78bfa;
    padding: 8px 16px;
    border-radius: 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
}
.wwg-nav a:hover {
    background: rgba(167, 139, 250, 0.2);
    border-color: rgba(167, 139, 250, 0.4);
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(167, 139, 250, 0.3);
}
<script>
(function() {
    let sequence = '';
    const trigger = 'PNPNPN';
    document.querySelectorAll('.wwg-nav a').forEach(a => {
        a.addEventListener('click', (e) => {
            const type = a.textContent.includes('Prev') ? 'P' : 'N';
            sequence += type;
            if (sequence.length > 6) sequence = sequence.substring(1);
            if (sequence === trigger) {
                e.preventDefault();
                window.location.href = 'time-loop.html';
            }
        });
    });
})();
</script>
</style>
<div class="wwg-nav">
    <a href="sand-sim.html">← Prev</a>
    <a href="dice-roller.html">Next →</a>
</div>

</html>
