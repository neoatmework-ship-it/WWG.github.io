<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%E2%98%A0%EF%B8%8F%3C%2Ftext%3E%3C%2Fsvg%3E">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Password Cracker | WWG</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --term-bg: #050505;
            --term-green: #00ff41;
            --term-dark-green: #003b0f;
            --term-red: #ff003c;
            --scanline: rgba(0, 255, 65, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--term-bg);
            color: var(--term-green);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* CRT Effects */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        @keyframes scroll {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-100%);
            }
        }

        .terminal {
            width: 100%;
            max-width: 800px;
            padding: 40px;
            position: relative;
            z-index: 3;
            text-shadow: 0 0 5px var(--term-green);
        }

        .header {
            border-bottom: 2px solid var(--term-green);
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 0;
        }

        .sys-info {
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: right;
        }

        .input-group {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prompt {
            color: var(--term-green);
            font-size: 1.2rem;
        }

        input[type="password"] {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: inherit;
            font-size: 1.2rem;
            width: 100%;
            outline: none;
            text-shadow: 0 0 5px var(--term-green);
            letter-spacing: 5px;
        }

        input[type="password"]::placeholder {
            color: var(--term-dark-green);
            text-shadow: none;
            letter-spacing: 1px;
        }

        /* Decryption Display */
        .cracker-display {
            font-size: 3rem;
            text-align: center;
            letter-spacing: 15px;
            min-height: 80px;
            word-wrap: break-word;
            margin: 40px 0;
            user-select: none;
        }

        .char {
            display: inline-block;
            transition: color 0.1s;
        }

        .char.locked {
            color: var(--term-bg);
            background-color: var(--term-green);
            text-shadow: none;
        }

        /* Status Output */
        .console-log {
            font-size: 0.9rem;
            color: var(--term-green);
            opacity: 0.8;
            min-height: 120px;
            border-left: 2px solid var(--term-dark-green);
            padding-left: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .log-line {
            margin: 2px 0;
            animation: fadeIn 0.1s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Error state */
        .denied {
            color: var(--term-red);
            text-shadow: 0 0 5px var(--term-red);
        }

        /* Glitch Animation */
        @keyframes glitch {

            2%,
            64% {
                transform: translate(2px, 0) skew(0deg);
            }

            4%,
            60% {
                transform: translate(-2px, 0) skew(0deg);
            }

            62% {
                transform: translate(0, 0) skew(5deg);
            }
        }

        .glitching {
            animation: glitch 0.2s cubic-bezier(.25, .46, .45, .94) both infinite;
            color: var(--term-red) !important;
            text-shadow: 0 0 10px var(--term-red) !important;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--term-dark-green);
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 10;
            transition: 0.2s;
        }

        .back-link:hover {
            color: var(--term-green);
            text-shadow: 0 0 5px var(--term-green);
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-link">&lt; SYSTEM.EXIT()</a>

    <div class="terminal">
        <div class="header">
            <h1>BRUTE_FORCE_PROTOCOL_v4.2</h1>
            <div class="sys-info" id="sys-time">NODE: 7X.4.A<br>TIME: 00:00:00</div>
        </div>

        <div class="input-group">
            <span class="prompt">root@local:~# ENCRYPT_PHRASE:</span>
            <input type="password" id="target-input" placeholder="Type target payload..." autocomplete="off">
        </div>

        <div class="cracker-display" id="display">
            <!-- Scrambled chars go here -->
        </div>

        <div class="console-log" id="console">
            <div class="log-line">> WAITING FOR TARGET INJECTION...</div>
        </div>
    </div>

    <script>
        const input = document.getElementById('target-input');
        const display = document.getElementById('display');
        const consoleLog = document.getElementById('console');
        const sysTime = document.getElementById('sys-time');

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?";

        let isCracking = false;
        let crackInterval;

        // Clock
        setInterval(() => {
            const d = new Date();
            sysTime.innerHTML = `NODE: 7X.4.A<br>TIME: ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}`;
        }, 1000);

        function log(msg, isError = false) {
            const line = document.createElement('div');
            line.className = 'log-line';
            if (isError) line.classList.add('denied');

            const timestamp = new Date().getTime().toString().slice(-6);
            line.textContent = `[${timestamp}] ${msg}`;

            consoleLog.appendChild(line);
            if (consoleLog.children.length > 5) {
                consoleLog.removeChild(consoleLog.children[0]);
            }
        }

        function randomChar() {
            return chars[Math.floor(Math.random() * chars.length)];
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isCracking) {
                const target = input.value.toUpperCase().replace(/\s/g, ''); // strip spaces
                if (target.length > 0 && target.length <= 15) {
                    startCrack(target);
                    input.value = '';
                } else if (target.length > 15) {
                    log("ERR: PAYLOAD TOO LARGE (MAX 15). CONNECTION RESET.", true);
                    input.value = '';
                }
            }
        });

        // The Hollywood Effect
        function displayScramble(length, lockedIndices, targetArray) {
            display.innerHTML = '';
            for (let i = 0; i < length; i++) {
                const span = document.createElement('span');
                span.className = 'char';

                if (lockedIndices.includes(i)) {
                    span.textContent = targetArray[i];
                    span.classList.add('locked');
                } else {
                    span.textContent = randomChar();
                }
                display.appendChild(span);
            }
        }

        async function startCrack(targetPhrase) {
            isCracking = true;
            input.disabled = true;
            log(`TARGET ACQUIRED: Hash length ${targetPhrase.length}`);
            log("INITIATING BRUTE FORCE PROTOCOL...");

            const targetArray = targetPhrase.split('');
            const length = targetArray.length;
            let lockedIndices = []; // Indices that have been "cracked"

            // Calculate difficulty curve - longer takes more time
            // We lock in a character roughly every X ms

            // Render loop for the flickering
            displayScramble(length, lockedIndices, targetArray);

            crackInterval = setInterval(() => {
                displayScramble(length, lockedIndices, targetArray);
            }, 50); // Scramble every 50ms

            // Logic loop to lock in characters pseudo-randomly over time
            for (let i = 0; i < length; i++) {
                // Random delay between 200ms and 800ms per character
                const delay = Math.floor(Math.random() * 600) + 200;
                await new Promise(r => setTimeout(r, delay));

                // Pick a random unlocked index to lock
                let available = [];
                for (let j = 0; j < length; j++) {
                    if (!lockedIndices.includes(j)) available.push(j);
                }

                if (available.length > 0) {
                    const toLock = available[Math.floor(Math.random() * available.length)];
                    lockedIndices.push(toLock);
                    log(`MATCH FOUND AT INDEX 0x0${toLock}: [${targetArray[toLock]}]`);
                }
            }

            // Finished
            clearInterval(crackInterval);
            displayScramble(length, lockedIndices, targetArray); // Final render

            log(">>> ACCESS GRANTED <<<");

            // Dramatic pause, then reset
            setTimeout(() => {
                display.innerHTML = '';
                log("> SYSTEM STANDBY.");
                input.disabled = false;
                input.focus();
                isCracking = false;
            }, 3000);
        }

    </script>
