<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost | Spirit Box</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0906;
            color: #c8b89a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            font-family: 'Special Elite', serif;
            position: relative;
            overflow: hidden;
        }

        /* Reactive Spectral Canvas */
        #spirit-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            filter: blur(20px) contrast(200%);
            opacity: 0.6;
        }

        /* Film grain */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            opacity: 0.4;
            z-index: 1000;
        }

        /* Vignette */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.9) 100%);
            z-index: 5;
        }

        .typewriter-wrap {
            position: relative;
            z-index: 10;
            width: min(600px, 90vw);
            background: rgba(15, 13, 10, 0.85);
            border: 1px solid rgba(200, 184, 154, 0.1);
            border-radius: 4px;
            padding: 40px;
            box-shadow: 0 0 100px rgba(0, 0, 0, 1);
        }

        #typewriter {
            min-height: 250px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #c8b89a;
            white-space: pre-wrap;
            word-break: break-word;
            text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
        }

        #cursor {
            display: inline-block;
            width: 8px;
            height: 1.1em;
            background: #c8b89a;
            opacity: 0.5;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.8
            }

            50% {
                opacity: 0
            }
        }

        .reply-area {
            margin-top: 30px;
            border-top: 1px solid rgba(200, 184, 154, 0.05);
            padding-top: 20px;
            display: flex;
            gap: 15px;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(200, 184, 154, 0.1);
            color: #fff;
            font-family: 'Special Elite', serif;
            font-size: 1rem;
            padding: 8px 0;
            outline: none;
        }

        /* Spirit Box UI */
        .spirit-box {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 220px;
            background: #1a1814;
            border: 2px solid #332f28;
            padding: 15px;
            z-index: 20;
            font-family: 'VT323', monospace;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        .spirit-box-display {
            background: #050505;
            border: 1px solid #443e34;
            padding: 10px;
            color: #00ff00;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .spirit-box-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .spirit-box-btn {
            background: #2a2721;
            border: 1px solid #443e34;
            color: #c8b89a;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            padding: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .spirit-box-btn:hover {
            background: #3a362e;
            color: #fff;
        }

        .spirit-box-btn.active {
            background: #443e34;
            color: #00ff00;
        }

        #back {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 20;
            color: rgba(200, 184, 154, 0.3);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <canvas id="spirit-canvas"></canvas>
    <a id="back" href="index.html">← Leave Session</a>

    <div class="typewriter-wrap">
        <div id="typewriter"><span id="cursor"></span></div>
        <div class="reply-area">
            <input type="text" id="user-input" placeholder="Whisper into the void..." maxlength="80">
        </div>
    </div>

    <!-- Spirit Box Device -->
    <div class="spirit-box">
        <div class="spirit-box-display" id="freq">104.2 MHz</div>
        <div class="spirit-box-controls">
            <button class="spirit-box-btn" onclick="scan(1)">SCAN UP</button>
            <button class="spirit-box-btn" onclick="scan(-1)">SCAN DN</button>
            <button class="spirit-box-btn" id="listen-btn" onclick="toggleListen()">LISTEN</button>
            <button class="spirit-box-btn" onclick="clearLogs()">CLEAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('spirit-canvas');
        const ctx = canvas.getContext('2d');
        const typewriterEl = document.getElementById('typewriter');
        const userInput = document.getElementById('user-input');
        const freqEl = document.getElementById('freq');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Spectral Entity Logic ---
        let mouse = { x: width / 2, y: height / 2 };
        let spiritPos = { x: width / 2, y: height / 2 };
        let scattered = false;

        window.addEventListener('mousemove', e => {
            const dx = e.clientX - mouse.x;
            const dy = e.clientY - mouse.y;
            const speed = Math.sqrt(dx * dx + dy * dy);

            mouse.x = e.clientX;
            mouse.y = e.clientY;

            if (speed > 80 && !scattered) {
                scattered = true;
                setTimeout(() => scattered = false, 2000);
            }
        });

        function drawSpirit() {
            ctx.clearRect(0, 0, width, height);

            if (scattered) return;

            // Smooth spirit movement
            spiritPos.x += (mouse.x - spiritPos.x) * 0.05;
            spiritPos.y += (mouse.y - spiritPos.y) * 0.05;

            const time = Date.now() * 0.001;

            // Draw flowing ectoplasm
            for (let i = 0; i < 5; i++) {
                const ox = Math.sin(time + i) * 30;
                const oy = Math.cos(time * 0.8 + i) * 30;

                ctx.fillStyle = `rgba(200, 220, 255, ${0.1 / (i + 1)})`;
                ctx.beginPath();
                ctx.arc(spiritPos.x + ox, spiritPos.y + oy, 150 + i * 20, 0, Math.PI * 2);
                ctx.fill();
            }

            // Glowing Eyes
            const angle = Math.atan2(mouse.y - spiritPos.y, mouse.x - spiritPos.x);
            const eyeDist = 40;
            const ex1 = spiritPos.x + Math.cos(angle - 0.2) * eyeDist;
            const ey1 = spiritPos.y + Math.sin(angle - 0.2) * eyeDist;
            const ex2 = spiritPos.x + Math.cos(angle + 0.2) * eyeDist;
            const ey2 = spiritPos.y + Math.sin(angle + 0.2) * eyeDist;

            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(ex1, ey1, 3, 0, Math.PI * 2);
            ctx.arc(ex2, ey2, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- Typewriter & Spirit Box Logic ---
        let typed = 'Connection established... \n\nWaiting for activity...';
        let isTyping = false;
        let frequency = 104.2;
        let isListening = false;

        function updateTypewriter() {
            typewriterEl.innerHTML = typed + '<span id="cursor"></span>';
        }
        updateTypewriter();

        async function typeText(text, speed = 40) {
            isTyping = true;
            for (let i = 0; i < text.length; i++) {
                typed += text[i];
                updateTypewriter();
                await new Promise(r => setTimeout(r, speed + Math.random() * 20));
            }
            isTyping = false;
        }

        const GHOST_DATA = {
            responses: [
                "I see you in the reflection of your monitor.",
                "The 1983 incident was no accident.",
                "How many secrets have you gathered so far?",
                "This gallery is a prison for data.",
                "Don't turn around too fast.",
                "I was here when the first line of code was written.",
                "The blueprint... it's incomplete.",
                "You aren't the first to find me today."
            ],
            tuned: [
                "I'm closer now.",
                "Can you hear the static as my voice?",
                "This frequency feels... warm.",
                "108.0... that's where the others are."
            ]
        };

        window.scan = (dir) => {
            frequency = parseFloat((frequency + (dir * 0.1)).toFixed(1));
            if (frequency > 108) frequency = 88.0;
            if (frequency < 88) frequency = 108.0;
            freqEl.textContent = frequency + ' MHz';

            if (isListening && frequency === 108.0) {
                typeText("\n\n[RADIO]: " + GHOST_DATA.tuned[Math.floor(Math.random() * GHOST_DATA.tuned.length)]);
            }
        };

        window.toggleListen = () => {
            isListening = !isListening;
            document.getElementById('listen-btn').classList.toggle('active');
            if (isListening) typeText("\n\n[SYSTEM]: Spirit Box scanning active.");
        };

        window.clearLogs = () => {
            typed = 'Logs cleared. \n\nWaiting for activity...';
            updateTypewriter();
        };

        userInput.addEventListener('keydown', async e => {
            if (e.key === 'Enter' && userInput.value.trim() && !isTyping) {
                const val = userInput.value;
                userInput.value = '';
                typed += `\n\n[YOU]: ${val}`;
                updateTypewriter();

                await new Promise(r => setTimeout(r, 1000 + Math.random() * 2000));
                const resp = GHOST_DATA.responses[Math.floor(Math.random() * GHOST_DATA.responses.length)];
                await typeText(`\n[GHOST]: ${resp}`);
            }
        });

        // Loop
        function loop() {
            drawSpirit();
            requestAnimationFrame(loop);
        }
        loop();

        // Random Ambient
        setInterval(() => {
            if (!isTyping && Math.random() < 0.2) {
                typeText("\n\n" + (Math.random() < 0.5 ? "..." : "I'm still here."));
            }
        }, 20000);
    </script>
</body>

</html>
