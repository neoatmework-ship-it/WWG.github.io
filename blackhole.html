<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .event-horizon {
            position: absolute;
            width: 15vh;
            height: 15vh;
            background: #000;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 0 50px 10px rgba(100, 100, 255, 0.2), inset 0 0 20px rgba(0, 0, 0, 1);
            animation: breathe 8s infinite alternate ease-in-out;
        }

        .accretion-disk {
            position: absolute;
            width: 40vh;
            height: 40vh;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 20%, rgba(200, 220, 255, 0.4) 40%, transparent 70%);
            z-index: 1;
            filter: blur(8px);
            transform: rotateX(70deg);
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotateX(75deg) rotateZ(0deg);
            }

            100% {
                transform: rotateX(75deg) rotateZ(360deg);
            }
        }

        @keyframes breathe {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 40px 5px rgba(100, 150, 255, 0.3);
            }

            100% {
                transform: scale(1.05);
                box-shadow: 0 0 80px 20px rgba(150, 200, 255, 0.5);
            }
        }

        .message {
            position: absolute;
            bottom: 20%;
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: fadeInOut 15s ease-in-out forwards;
            pointer-events: none;
        }

        .message h1 {
            font-size: 1.5rem;
            letter-spacing: 15px;
            font-weight: 300;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                opacity: 0.1;
            }
        }

        .back-link {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 5px;
            transition: 0.5s;
            z-index: 20;
            text-transform: uppercase;
        }

        .back-link:hover {
            color: #fff;
            text-shadow: 0 0 10px #fff;
            letter-spacing: 8px;
        }
    </style>
</head>

<body>

    <canvas id="canvas-container"></canvas>

    <div class="accretion-disk"></div>
    <div class="event-horizon"></div>

    <div class="message">
        <h1>Density Critical</h1>
    </div>

    <a href="index.html" class="back-link">Escape Pull</a>

    <script>
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');

        let width, height, cx, cy;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cx = width / 2;
            cy = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = [];
        const numParticles = 300;

        for (let i = 0; i < numParticles; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 2 + 0.5,
                angle: Math.random() * Math.PI * 2,
                speed: Math.random() * 2 + 0.5,
                dist: Math.random() * Math.max(width, height) + 100
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; // trails
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#fff';

            particles.forEach(p => {
                // spiral inwards
                p.dist -= p.speed;
                p.angle += 0.05 + (100 / Math.max(p.dist, 10)); // rotate faster as it gets closer

                if (p.dist < 10) {
                    p.dist = Math.max(width, height) + 100; // reset
                    p.angle = Math.random() * Math.PI * 2;
                }

                p.x = cx + Math.cos(p.angle) * p.dist;
                p.y = cy + Math.sin(p.angle) * p.dist;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }

        draw();

        // Deep drone
        window.addEventListener('click', () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const actx = new AudioContext();

            const osc = actx.createOscillator();
            const gain = actx.createGain();

            osc.type = 'sine';
            osc.frequency.value = 30; // Sub bass

            gain.gain.setValueAtTime(0, actx.currentTime);
            gain.gain.linearRampToValueAtTime(0.8, actx.currentTime + 5);

            osc.connect(gain);
            gain.connect(actx.destination);

            osc.start();
        }, { once: true });
    </script>
</body>

</html>
