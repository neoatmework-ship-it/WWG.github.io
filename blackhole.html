<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK HOLE</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gravity: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas#void-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .center-void {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #000;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 0 50px 20px rgba(100, 100, 255, 0.1), inset 0 0 30px #000;
        }

        .accretion-disk {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 40%, rgba(200, 200, 255, 0.1) 60%, transparent 80%);
            z-index: 5;
            filter: blur(20px);
            transform: rotateX(75deg);
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotateX(75deg) rotateZ(0deg);
            }

            to {
                transform: rotateX(75deg) rotateZ(360deg);
            }
        }

        .ui-content {
            position: relative;
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }

        #heading {
            font-size: 3rem;
            letter-spacing: 20px;
            opacity: 0.8;
            transition: transform 0.1s;
        }

        .back-link {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 5px;
            z-index: 30;
            transition: transform 0.1s, opacity 0.5s;
        }

        .back-link:hover {
            color: #fff;
            opacity: 1;
        }

        .lens {
            position: fixed;
            inset: 0;
            z-index: 15;
            pointer-events: none;
            backdrop-filter: blur(5px);
            mask-image: radial-gradient(circle at center, transparent 100px, black 300px);
            -webkit-mask-image: radial-gradient(circle at center, transparent 100px, black 300px);
        }
    </style>
</head>

<body>
    <canvas id="void-canvas"></canvas>
    <div class="lens"></div>

    <div class="accretion-disk"></div>
    <div class="center-void"></div>

    <div class="ui-content">
        <h1 id="heading">SINGULARITY</h1>
        <p style="opacity: 0.4; letter-spacing: 5px; margin-top: 20px;">LAW OF PHYSICS: SUSPENDED</p>
    </div>

    <a href="index.html" class="back-link" id="exit">← ESCAPE COLLAPSE</a>

    <script>
        const canvas = document.getElementById('void-canvas');
        const ctx = canvas.getContext('2d');
        const heading = document.getElementById('heading');
        const exit = document.getElementById('exit');

        let width, height, cx, cy;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cx = width / 2;
            cy = height / 2;
        }
        window.onresize = resize;
        resize();

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * Math.max(width, height) + 100;
                this.x = cx + Math.cos(angle) * dist;
                this.y = cy + Math.sin(angle) * dist;
                this.px = this.x;
                this.py = this.y;
                this.speed = Math.random() * 2 + 1;
            }

            update() {
                this.px = this.x;
                this.py = this.y;

                const dx = cx - this.x;
                const dy = cy - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Gravity
                const force = 100 / (dist + 1);
                const angle = Math.atan2(dy, dx);

                // Spaghettification factor
                const stretch = Math.max(1, 200 / (dist + 1));

                this.x += Math.cos(angle) * (this.speed + force);
                this.y += Math.sin(angle) * (this.speed + force);

                // Swirl
                this.x += Math.cos(angle + Math.PI / 2) * (force * 2);
                this.y += Math.sin(angle + Math.PI / 2) * (force * 2);

                if (dist < 10) this.reset();
            }

            draw() {
                ctx.strokeStyle = `rgba(200, 200, 255, ${Math.min(1, 200 / (Math.sqrt((cx - this.x) ** 2 + (cy - this.y) ** 2)))})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(this.px, this.py);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
            }
        }

        const particles = Array.from({ length: 400 }, () => new Particle());

        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // UI Spaghettification
            const hdx = cx - width / 2;
            const hdy = cy - height / 2; // In this case cx/cy are center
            // (Assuming mouse interaction later, for now simulate constant pull)

            // Re-center logic for elements
            const updateUI = (el, factor) => {
                const rect = el.getBoundingClientRect();
                const elX = rect.left + rect.width / 2;
                const elY = rect.top + rect.height / 2;
                const dx = cx - elX;
                const dy = cy - elY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const pull = Math.min(dist, 500 / (dist + 1)) * factor;
                const angle = Math.atan2(dy, dx);
                el.style.transform = `translate(${Math.cos(angle) * pull}px, ${Math.sin(angle) * pull}px) scale(${Math.max(0.5, 1 - pull / 100)})`;
            };

            // updateUI(heading, 0.1); // Too jittery for constant loop without mouse

            requestAnimationFrame(loop);
        }

        loop();

        // Drone
        try {
            const ac = new AudioContext();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.frequency.setValueAtTime(20, ac.currentTime);
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.05, ac.currentTime);
            osc.connect(gain);
            gain.connect(ac.destination);
            osc.start();
        } catch (e) { }
    </script>
</body>

</html>
