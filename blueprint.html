<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWG Architecture | Power Schematic</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #001221;
            --blueprint: #005a9e;
            --accent: #00f2ff;
            --danger: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        #blueprint-viewport {
            width: 100vw;
            height: 100vh;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #blueprint-viewport:active {
            cursor: grabbing;
        }

        .schematic-container {
            position: relative;
            transform-origin: center;
            transition: transform 0.1s;
        }

        svg {
            width: 1200px;
            height: 800px;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.1));
        }

        .node {
            cursor: pointer;
            transition: 0.3s;
        }

        .node:hover circle {
            stroke-width: 4;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .power-line {
            stroke: var(--blueprint);
            stroke-width: 2;
            stroke-dasharray: 10;
            fill: none;
            transition: 0.5s;
        }

        .power-line.active {
            stroke: var(--accent);
            animation: flow 2s linear infinite;
        }

        @keyframes flow {
            to {
                stroke-dashoffset: -20;
            }
        }

        .ui-panel {
            position: fixed;
            background: rgba(0, 18, 33, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 20px;
            z-index: 100;
        }

        .top-left {
            top: 20px;
            left: 20px;
            border-left: 5px solid var(--accent);
        }

        .bottom-right {
            bottom: 20px;
            right: 20px;
            width: 300px;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .meta {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .gauge {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            margin: 10px 0;
            position: relative;
            overflow: hidden;
        }

        .gauge-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s;
            box-shadow: 0 0 10px var(--accent);
        }

        .back-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            z-index: 100;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .node-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            fill: #fff;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="grid-overlay"></div>
    <a href="index.html" class="back-link">← EXIT_BLUEPRINT</a>

    <div class="ui-panel top-left">
        <h1>SYSTEM ARCHITECTURE</h1>
        <div class="meta">REF_ID: WWG-99 // STATUS: [ENCRYPTED]</div>
    </div>

    <div class="ui-panel bottom-right">
        <div class="meta">GRID_LOAD: <span id="load-val">42%</span></div>
        <div class="gauge">
            <div class="gauge-fill" id="load-gauge" style="width: 42%;"></div>
        </div>
        <div class="meta">CORE_TEMP: <span id="temp-val">34°C</span></div>
        <div class="gauge">
            <div class="gauge-fill" id="temp-gauge" style="width: 34%;"></div>
        </div>
        <div style="margin-top: 15px; font-size: 0.8rem; line-height: 1.4;">
            <span style="color: var(--accent)">></span> Click nodes to toggle power routing.<br>
            <span style="color: var(--accent)">></span> Drag to explore the schematic.
        </div>
    </div>

    <div id="blueprint-viewport">
        <div class="schematic-container" id="container">
            <svg viewBox="0 0 1200 800">
                <!-- Power Lines -->
                <path id="line1" class="power-line" d="M200 200 L 600 400" />
                <path id="line2" class="power-line" d="M200 600 L 600 400" />
                <path id="line3" class="power-line" d="M1000 200 L 600 400" />
                <path id="line4" class="power-line" d="M1000 600 L 600 400" />

                <!-- Central Core -->
                <g class="node" onclick="toggleNode(this, 'core')">
                    <circle cx="600" cy="400" r="80" fill="rgba(0, 242, 255, 0.05)" stroke="var(--accent)"
                        stroke-width="2" />
                    <circle cx="600" cy="400" r="60" fill="none" stroke="var(--accent)" stroke-width="1"
                        stroke-dasharray="5" />
                    <text x="600" y="405" class="node-label" text-anchor="middle">CORE_OS</text>
                </g>

                <!-- Peripheral Nodes -->
                <g class="node" onclick="toggleNode(this, 'line1')">
                    <circle cx="200" cy="200" r="40" fill="rgba(255,255,255,0.02)" stroke="#fff" stroke-width="1" />
                    <text x="200" y="205" class="node-label" text-anchor="middle">VOID_ENG</text>
                </g>

                <g class="node" onclick="toggleNode(this, 'line2')">
                    <circle cx="200" cy="600" r="40" fill="rgba(255,255,255,0.02)" stroke="#fff" stroke-width="1" />
                    <text x="200" y="605" class="node-label" text-anchor="middle">GHOST_MOD</text>
                </g>

                <g class="node" onclick="toggleNode(this, 'line3')">
                    <circle cx="1000" cy="200" r="40" fill="rgba(255,255,255,0.02)" stroke="#fff" stroke-width="1" />
                    <text x="1000" y="205" class="node-label" text-anchor="middle">LIMIT_SYS</text>
                </g>

                <g class="node" onclick="toggleNode(this, 'line4')">
                    <circle cx="1000" cy="600" r="40" fill="rgba(255,255,255,0.02)" stroke="#fff" stroke-width="1" />
                    <text x="1000" y="605" class="node-label" text-anchor="middle">DATA_BRCH</text>
                </g>
            </svg>
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const viewport = document.getElementById('blueprint-viewport');
        const loadVal = document.getElementById('load-val');
        const loadGauge = document.getElementById('load-gauge');
        const tempVal = document.getElementById('temp-val');
        const tempGauge = document.getElementById('temp-gauge');

        let zoom = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let startX, startY;

        // Pan & Zoom
        viewport.onmousedown = (e) => {
            isDragging = true;
            startX = e.clientX - panX;
            startY = e.clientY - panY;
        };
        window.onmousemove = (e) => {
            if (!isDragging) return;
            panX = e.clientX - startX;
            panY = e.clientY - startY;
            updateTransform();
        };
        window.onmouseup = () => isDragging = false;
        window.onwheel = (e) => {
            zoom -= e.deltaY * 0.001;
            zoom = Math.min(Math.max(0.5, zoom), 2);
            updateTransform();
        };

        function updateTransform() {
            container.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        }

        function toggleNode(el, lineId) {
            const line = document.getElementById(lineId);
            if (line) {
                line.classList.toggle('active');
                updateStats();
            }
            el.querySelector('circle').style.stroke = line && line.classList.contains('active') ? 'var(--accent)' : '#fff';
            playTone();
        }

        function updateStats() {
            const activeCount = document.querySelectorAll('.power-line.active').length;
            const load = 20 + (activeCount * 20);
            loadVal.textContent = load + '%';
            loadGauge.style.width = load + '%';

            const temp = 30 + (activeCount * 5);
            tempVal.textContent = temp + '°C';
            tempGauge.style.width = temp + '%';
        }

        function playTone() {
            try {
                const ac = new AudioContext();
                const osc = ac.createOscillator();
                const gain = ac.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ac.currentTime);
                gain.gain.setValueAtTime(0.05, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
                osc.connect(gain); gain.connect(ac.destination);
                osc.start(); osc.stop(ac.currentTime + 0.1);
            } catch (e) { }
        }
    </script>
</body>

</html>
