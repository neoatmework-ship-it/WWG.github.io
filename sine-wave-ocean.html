<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sine Wave Ocean | WWG</title>
    <style>
        :root {
            --bg-top: #ff7e5f;
            --bg-bottom: #feb47b;
            --ocean-1: rgba(10, 80, 160, 0.4);
            --ocean-2: rgba(20, 100, 180, 0.5);
            --ocean-3: rgba(40, 120, 200, 0.6);
            --ocean-4: rgba(60, 140, 220, 0.7);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas {
            display: block;
            background: linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            color: white;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .controls:hover {
            opacity: 1;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .control-group input {
            width: 100%;
            cursor: pointer;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 10;
            transition: background 0.2s;
        }

        .back-link:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        h1 {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: white;
            margin: 0;
            font-size: 3rem;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            z-index: 5;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← Back to Gallery</a>
    <h1>Sine Wave Ocean</h1>

    <div class="controls">
        <div class="control-group">
            <label for="wave-count">Wave Layers: <span id="wave-count-val">5</span></label>
            <input type="range" id="wave-count" min="1" max="10" value="5">
        </div>
        <div class="control-group">
            <label for="wave-amplitude">Amplitude: <span id="wave-amplitude-val">50</span></label>
            <input type="range" id="wave-amplitude" min="10" max="150" value="50">
        </div>
        <div class="control-group">
            <label for="wave-frequency">Frequency: <span id="wave-frequency-val">0.01</span></label>
            <input type="range" id="wave-frequency" min="0.001" max="0.05" step="0.001" value="0.01">
        </div>
        <div class="control-group">
            <label for="wave-speed">Speed: <span id="wave-speed-val">0.05</span></label>
            <input type="range" id="wave-speed" min="0.01" max="0.2" step="0.01" value="0.05">
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let waves = [];
        let mouseX = 0;
        let mouseY = 0;

        const config = {
            count: 5,
            amplitude: 50,
            frequency: 0.01,
            speed: 0.05
        };

        const waveCountInput = document.getElementById('wave-count');
        const waveAmplitudeInput = document.getElementById('wave-amplitude');
        const waveFrequencyInput = document.getElementById('wave-frequency');
        const waveSpeedInput = document.getElementById('wave-speed');

        const waveCountVal = document.getElementById('wave-count-val');
        const waveAmplitudeVal = document.getElementById('wave-amplitude-val');
        const waveFrequencyVal = document.getElementById('wave-frequency-val');
        const waveSpeedVal = document.getElementById('wave-speed-val');

        function updateConfig() {
            config.count = parseInt(waveCountInput.value);
            config.amplitude = parseInt(waveAmplitudeInput.value);
            config.frequency = parseFloat(waveFrequencyInput.value);
            config.speed = parseFloat(waveSpeedInput.value);

            waveCountVal.textContent = config.count;
            waveAmplitudeVal.textContent = config.amplitude;
            waveFrequencyVal.textContent = config.frequency;
            waveSpeedVal.textContent = config.speed;

            initWaves();
        }

        waveCountInput.oninput = updateConfig;
        waveAmplitudeInput.oninput = updateConfig;
        waveFrequencyInput.oninput = updateConfig;
        waveSpeedInput.oninput = updateConfig;

        function initWaves() {
            waves = [];
            for (let i = 0; i < config.count; i++) {
                waves.push({
                    y: height / 2 + (i * 40),
                    length: config.frequency + (Math.random() * 0.01),
                    amplitude: config.amplitude + (Math.random() * 20),
                    speed: config.speed + (Math.random() * 0.02),
                    phase: Math.random() * Math.PI * 2,
                    color: `rgba(${60 + i * 20}, ${100 + i * 20}, ${200 + i * 10}, ${0.4 + i * 0.1})`
                });
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initWaves();
        }

        window.onresize = resize;
        resize();

        window.onmousemove = (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        };

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Draw Sun (Background)
            const sunX = width * 0.8;
            const sunY = height * 0.3;
            const sunRadius = 100;
            const gradient = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunRadius);
            gradient.addColorStop(0, '#fff');
            gradient.addColorStop(0.2, '#ff0');
            gradient.addColorStop(0.5, '#f90');
            gradient.addColorStop(1, 'rgba(255, 150, 0, 0)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(sunX, sunY, sunRadius * 2, 0, Math.PI * 2);
            ctx.fill();

            waves.forEach((wave, index) => {
                ctx.beginPath();
                ctx.moveTo(0, height);
                ctx.lineTo(0, wave.y);

                for (let i = 0; i < width; i++) {
                    // Base oscillation
                    let yOffset = Math.sin(i * wave.length + wave.phase) * wave.amplitude;

                    // Mouse interaction
                    const dist = Math.abs(i - mouseX);
                    if (dist < 200) {
                        const strength = (1 - dist / 200) * 50;
                        const mouseEffect = Math.sin(i * 0.05 + wave.phase) * strength;
                        yOffset += mouseEffect;
                    }

                    ctx.lineTo(i, wave.y + yOffset);
                }

                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fillStyle = wave.color;
                ctx.fill();

                wave.phase += wave.speed;
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
