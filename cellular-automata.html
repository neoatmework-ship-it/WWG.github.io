<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cellular Automata | WWG</title>
    <style>
        :root {
            --bg: #050505;
            --cell-alive: #00ff66;
            --cell-dead: #111;
            --grid-line: #222;
            --accent: #00ff66;
            --text: #fff;
            --panel-bg: rgba(20, 20, 20, 0.9);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            display: flex;
        }

        #canvas {
            flex: 1;
            cursor: crosshair;
        }

        .side-panel {
            width: 300px;
            background: var(--panel-bg);
            border-left: 1px solid #333;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .description {
            font-size: 0.8rem;
            color: #888;
            line-height: 1.5;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 0.75rem;
            font-weight: bold;
            color: #aaa;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: rgba(0, 255, 102, 0.1);
            transform: translateY(-2px);
        }

        .btn.active {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.1);
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .stats {
            font-family: monospace;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 4px;
            color: var(--accent);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 5px;
            backdrop-filter: blur(5px);
            z-index: 20;
        }

        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .preset-btn {
            font-size: 0.7rem;
            padding: 5px;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← Gallery</a>

    <canvas id="canvas"></canvas>

    <div class="side-panel">
        <h1>Conway's UI</h1>
        <p class="description">Emergent life simulation based on four simple rules of reproduction and survival.</p>

        <div class="control-group">
            <button class="btn" id="play-pause">Start Simulation</button>
            <button class="btn" id="step">Next Step</button>
            <button class="btn btn-danger" id="clear">Clear Grid</button>
        </div>

        <div class="control-group">
            <label>Simulation Speed</label>
            <input type="range" id="speed" min="1" max="60" value="30">
        </div>

        <div class="control-group">
            <label>Cell Density (Randomize)</label>
            <button class="btn" id="random">Seed Life</button>
        </div>

        <div class="control-group">
            <label>Presets</label>
            <div class="preset-grid">
                <button class="btn preset-btn" onclick="loadPreset('glider')">Glider</button>
                <button class="btn preset-btn" onclick="loadPreset('pulsar')">Pulsar</button>
                <button class="btn preset-btn" onclick="loadPreset('gosper')">Gun</button>
                <button class="btn preset-btn" onclick="loadPreset('spaceship')">Spaceship</button>
            </div>
        </div>

        <div class="stats" id="stats">
            Generation: 0<br>
            Population: 0
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('play-pause');
        const stepBtn = document.getElementById('step');
        const clearBtn = document.getElementById('clear');
        const randomBtn = document.getElementById('random');
        const speedInput = document.getElementById('speed');
        const statsEl = document.getElementById('stats');

        const CELL_SIZE = 12;
        let ROWS, COLS;
        let grid = [];
        let isRunning = false;
        let generation = 0;
        let lastUpdate = 0;

        function init() {
            COLS = Math.floor(canvas.width / CELL_SIZE);
            ROWS = Math.floor(canvas.height / CELL_SIZE);
            grid = Array.from({ length: COLS }, () => Array(ROWS).fill(0));
            draw();
        }

        function resize() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            init();
        }

        window.onresize = resize;
        resize();

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let population = 0;

            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    if (grid[x][y] === 1) {
                        ctx.fillStyle = '#00ff66';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                        population++;
                    } else {
                        ctx.fillStyle = '#111';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                    }
                }
            }

            statsEl.innerHTML = `Generation: ${generation}<br>Population: ${population}`;
        }

        function nextGeneration() {
            const nextGrid = grid.map(arr => [...arr]);

            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    const neighbors = countNeighbors(x, y);
                    const state = grid[x][y];

                    if (state === 0 && neighbors === 3) {
                        nextGrid[x][y] = 1;
                    } else if (state === 1 && (neighbors < 2 || neighbors > 3)) {
                        nextGrid[x][y] = 0;
                    }
                }
            }

            grid = nextGrid;
            generation++;
            draw();
        }

        function countNeighbors(x, y) {
            let count = 0;
            for (let i = -1; i < 2; i++) {
                for (let j = -1; j < 2; j++) {
                    if (i === 0 && j === 0) continue;
                    const col = (x + i + COLS) % COLS;
                    const row = (y + j + ROWS) % ROWS;
                    count += grid[col][row];
                }
            }
            return count;
        }

        function toggleCell(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
            const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);
            if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
                grid[x][y] = grid[x][y] ? 0 : 1;
                draw();
            }
        }

        canvas.onmousedown = (e) => {
            toggleCell(e);
            canvas.onmousemove = toggleCell;
        };
        window.onmouseup = () => canvas.onmousemove = null;

        playBtn.onclick = () => {
            isRunning = !isRunning;
            playBtn.textContent = isRunning ? "Pause Simulation" : "Start Simulation";
            playBtn.classList.toggle('active');
        };

        stepBtn.onclick = () => {
            if (!isRunning) nextGeneration();
        };

        clearBtn.onclick = () => {
            grid = Array.from({ length: COLS }, () => Array(ROWS).fill(0));
            generation = 0;
            isRunning = false;
            playBtn.textContent = "Start Simulation";
            playBtn.classList.remove('active');
            draw();
        };

        randomBtn.onclick = () => {
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    grid[x][y] = Math.random() > 0.85 ? 1 : 0;
                }
            }
            generation = 0;
            draw();
        };

        function loadPreset(type) {
            const midX = Math.floor(COLS / 2);
            const midY = Math.floor(ROWS / 2);

            if (type === 'glider') {
                grid[midX][midY] = 1; grid[midX + 1][midY + 1] = 1; grid[midX - 1][midY + 2] = 1; grid[midX][midY + 2] = 1; grid[midX + 1][midY + 2] = 1;
            } else if (type === 'pulsar') {
                const p = [[-1, -2], [-1, -3], [-1, -4], [-2, -1], [-3, -1], [-4, -1], [1, -2], [1, -3], [1, -4], [2, -1], [3, -1], [4, -1], [-1, 2], [-1, 3], [-1, 4], [-2, 1], [-3, 1], [-4, 1], [1, 2], [1, 3], [1, 4], [2, 1], [3, 1], [4, 1], [-2, 6], [-3, 6], [-4, 6], [-6, 2], [-6, 3], [-6, 4], [2, 6], [3, 6], [4, 6], [6, 2], [6, 3], [6, 4], [-2, -6], [-3, -6], [-4, -6], [-6, -2], [-6, -3], [-6, -4], [2, -6], [3, -6], [4, -6], [6, -2], [6, -3], [6, -4]];
                p.forEach(([ox, oy]) => grid[midX + ox][midY + oy] = 1);
            } else if (type === 'gosper') {
                const g = [[1, 5], [1, 6], [2, 5], [2, 6], [11, 5], [11, 6], [11, 7], [12, 4], [12, 8], [13, 3], [13, 9], [14, 3], [14, 9], [15, 6], [16, 4], [16, 8], [17, 5], [17, 6], [17, 7], [18, 6], [21, 3], [21, 4], [21, 5], [22, 3], [22, 4], [22, 5], [23, 2], [23, 6], [25, 1], [25, 2], [25, 6], [25, 7], [35, 3], [35, 4], [36, 3], [36, 4]];
                g.forEach(([ox, oy]) => grid[midX - 20 + ox][midY - 10 + oy] = 1);
            } else if (type === 'spaceship') {
                const s = [[1, 1], [4, 1], [5, 2], [1, 3], [5, 3], [2, 4], [3, 4], [4, 4], [5, 4]];
                s.forEach(([ox, oy]) => grid[midX + ox][midY + oy] = 1);
            }
            draw();
        }

        function animate(timestamp) {
            if (isRunning) {
                const thresh = 1000 / parseInt(speedInput.value);
                if (timestamp - lastUpdate > thresh) {
                    nextGeneration();
                    lastUpdate = timestamp;
                }
            }
            requestAnimationFrame(animate);
        }

        animate(0);
    </script>
</body>

</html>
