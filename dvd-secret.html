<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Corner Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            animation: bgFlash 4s infinite alternate;
        }

        @keyframes bgFlash {
            0% {
                background: #000;
            }

            100% {
                background: #0a0000;
            }
        }

        .box {
            text-align: center;
            border: 4px solid #fff;
            padding: 40px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.5), inset 0 0 50px rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 50px rgba(255, 255, 255, 0.5), inset 0 0 50px rgba(255, 255, 255, 0.5);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 80px rgba(255, 255, 255, 1), inset 0 0 80px rgba(255, 255, 255, 1);
            }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.7;
            letter-spacing: 2px;
        }

        .back {
            margin-top: 30px;
            display: inline-block;
            color: #fff;
            text-decoration: none;
            opacity: 0.5;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .back:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>THE CORNER</h1>
        <p>You did it. You actually hit the corner.</p>
        <p style="font-size: 0.8rem; margin-top:20px; color:#888;">There is nothing else here. Only the satisfaction of
            the perfect bounce.</p>
        <a href="index.html" class="back">← LEAVE THE CORNER</a>
    </div>
</body>

</html>
