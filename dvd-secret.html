<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Corner | Satisfying Bounce</title>
    <script src="discovery.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ffcc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas#dvd-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        .crt-grain {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.05;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23n)"/%3E%3C/svg%3E');
        }

        .ui-layer {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 20;
            opacity: 0.3;
            font-size: 0.7rem;
            letter-spacing: 3px;
            pointer-events: none;
        }

        .back-link {
            position: fixed;
            bottom: 40px;
            right: 40px;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            z-index: 50;
        }

        .back-link:hover {
            color: #fff;
        }

        .corner-count {
            position: fixed;
            top: 40px;
            right: 40px;
            font-size: 2rem;
            color: var(--neon);
            text-shadow: 0 0 20px var(--neon);
            z-index: 20;
        }

        #flash {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .logo-hint {
            position: fixed;
            top: 40px;
            left: 40px;
            font-size: 1.2rem;
            color: #333;
            letter-spacing: 5px;
            z-index: 5;
        }
    </style>
</head>

<body>
    <div id="flash"></div>
    <div class="crt-grain"></div>
    <div class="logo-hint">S A T I S F A C T I O N</div>

    <div class="ui-layer">DRAG TO THROW // WAIT FOR THE CORNER</div>
    <div class="corner-count" id="count">0</div>

    <a href="index.html" class="back-link">← EXIT THE CORNER</a>

    <canvas id="dvd-canvas"></canvas>

    <script>
        const canvas = document.getElementById('dvd-canvas');
        const ctx = canvas.getContext('2d');
        const countDisplay = document.getElementById('count');
        const flash = document.getElementById('flash');

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let posX = Math.random() * width;
        let posY = Math.random() * height;
        let velX = 3;
        let velY = 3;
        const logoWidth = 150;
        const logoHeight = 80;
        let colorIdx = 0;
        const colors = ['#00ffcc', '#ff0066', '#ffff00', '#0099ff', '#ffffff'];
        let cornerHits = 0;

        let isDragging = false;
        let mouseX, mouseY;

        // Interaction
        window.onmousedown = (e) => {
            if (e.clientX > posX && e.clientX < posX + logoWidth && e.clientY > posY && e.clientY < posY + logoHeight) {
                isDragging = true;
            }
        };
        window.onmousemove = (e) => {
            if (isDragging) {
                velX = e.clientX - mouseX;
                velY = e.clientY - mouseY;
                posX = e.clientX - logoWidth / 2;
                posY = e.clientY - logoHeight / 2;
            }
            mouseX = e.clientX;
            mouseY = e.clientY;
        };
        window.onmouseup = () => isDragging = false;

        function update() {
            if (!isDragging) {
                posX += velX;
                posY += velY;

                let hitX = false;
                let hitY = false;

                if (posX <= 0 || posX + logoWidth >= width) {
                    velX *= -1;
                    hitX = true;
                    changeColor();
                }
                if (posY <= 0 || posY + logoHeight >= height) {
                    velY *= -1;
                    hitY = true;
                    changeColor();
                }

                if (hitX && hitY) {
                    triggerCornerHit();
                }

                // Friction
                velX *= 0.999;
                velY *= 0.999;
                if (Math.abs(velX) < 1) velX = velX < 0 ? -2 : 2;
                if (Math.abs(velY) < 1) velY = velY < 0 ? -2 : 2;
            }

            draw();
            requestAnimationFrame(update);
        }

        function changeColor() {
            colorIdx = (colorIdx + 1) % colors.length;
            document.documentElement.style.setProperty('--neon', colors[colorIdx]);
            playBounceSound(200);
        }

        function triggerCornerHit() {
            cornerHits++;
            countDisplay.innerHTML = cornerHits;
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 200);
            playBounceSound(800);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Neon Glow
            ctx.shadowBlur = 20;
            ctx.shadowColor = colors[colorIdx];

            // Draw "DVD" Style Logo
            ctx.fillStyle = colors[colorIdx];
            ctx.font = "900 60px 'Space Grotesk'";
            ctx.fillText("SATIS", posX, posY + 50);
            ctx.font = "300 15px 'Space Grotesk'";
            ctx.fillText("CORNER EDITION", posX, posY + 70);

            ctx.shadowBlur = 0;
        }

        // Audio
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        function playBounceSound(freq) {
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.frequency.setValueAtTime(freq, ac.currentTime);
            gain.gain.setValueAtTime(0.1, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
            osc.connect(gain); gain.connect(ac.destination);
            osc.start(); osc.stop(ac.currentTime + 0.1);
        }

        update();
    </script>
</body>

</html>
