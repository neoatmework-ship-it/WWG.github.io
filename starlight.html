<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlight</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #02010a;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
            opacity: 0;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.1;
                transform: scale(1);
                box-shadow: 0 0 2px white;
            }

            100% {
                opacity: 1;
                transform: scale(1.5);
                box-shadow: 0 0 10px white, 0 0 20px rgba(255, 255, 255, 0.5);
            }
        }

        .message {
            z-index: 10;
            text-align: center;
            opacity: 0;
            animation: fadeIn 4s ease-in 2s forwards;
            pointer-events: none;
        }

        .message h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 12px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }

        .message p {
            font-size: 1rem;
            letter-spacing: 4px;
            color: #a0a0b0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .back-link {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
            z-index: 20;
            opacity: 0;
            animation: fadeIn 2s ease-in 6s forwards;
        }

        .back-link:hover {
            color: white;
            text-shadow: 0 0 10px white;
        }

        /* Subtle glowing horizon */
        .horizon {
            position: absolute;
            bottom: -50vh;
            left: -50vw;
            width: 200vw;
            height: 100vh;
            background: radial-gradient(ellipse at top, rgba(20, 30, 80, 0.4) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="horizon"></div>

    <div class="message">
        <h1>STARLIGHT</h1>
        <p>A gentle melody carries you far away.</p>
    </div>

    <a href="index.html" class="back-link">Return to the gallery</a>

    <script>
        // Generate stars
        const numStars = 200;
        for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');

            // Random position
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;

            // Random size
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;

            // Random animation duration and delay
            star.style.setProperty('--duration', `${Math.random() * 3 + 1.5}s`);
            star.style.animationDelay = `${Math.random() * 5}s`;

            // Random warm/cool star colors occasionally
            const rand = Math.random();
            if (rand > 0.9) {
                star.style.background = '#ffd2a6'; // Warm
            } else if (rand < 0.1) {
                star.style.background = '#a6c8ff'; // Cool
            }

            document.body.appendChild(star);
        }

        // Play a soft, ambient generative chord on load
        window.addEventListener('click', () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();

            function playNote(freq, delay) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.value = freq;

                gain.gain.setValueAtTime(0, ctx.currentTime + delay);
                gain.gain.linearRampToValueAtTime(0.1, ctx.currentTime + delay + 2);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 8);

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.start(ctx.currentTime + delay);
                osc.stop(ctx.currentTime + delay + 8);
            }

            // An ethereal CMaj7 add9 chord
            playNote(130.81, 0);   // C3
            playNote(261.63, 0.5); // C4
            playNote(392.00, 1.0); // G4
            playNote(493.88, 1.5); // B4
            playNote(659.25, 2.0); // E5
            playNote(587.33, 2.5); // D5
        }, { once: true });
    </script>
</body>

</html>
