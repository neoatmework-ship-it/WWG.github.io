<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>103.7 FM — The Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #040608;
            color: #22d3ee;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .static-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            animation: staticAnim 0.1s steps(1) infinite;
        }

        @keyframes staticAnim {
            0% {
                background-position: 0 0
            }

            100% {
                background-position: 200px 200px
            }
        }

        .station-id {
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: #22d3ee40;
            z-index: 1;
        }

        .freq {
            font-size: 4rem;
            font-weight: bold;
            color: #22d3ee;
            text-shadow: 0 0 20px #22d3ee, 0 0 60px #22d3ee40;
            z-index: 1;
            animation: fq 3s ease infinite;
        }

        @keyframes fq {

            0%,
            100% {
                text-shadow: 0 0 20px #22d3ee, 0 0 60px #22d3ee40
            }

            50% {
                text-shadow: 0 0 40px #22d3ee, 0 0 100px #22d3ee60
            }
        }

        .vu {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 60px;
            z-index: 1;
        }

        .vu-bar {
            width: 8px;
            background: #22d3ee30;
            border-radius: 2px 2px 0 0;
            animation: vu linear infinite;
        }

        @keyframes vu {

            0%,
            100% {
                height: 10%
            }

            50% {
                height: var(--h)
            }
        }

        #broadcast {
            max-width: 500px;
            width: 100%;
            z-index: 1;
            background: rgba(34, 211, 238, 0.04);
            border: 1px solid #22d3ee20;
            border-radius: 10px;
            padding: 24px;
            font-size: 0.78rem;
            line-height: 2;
            color: #22d3ee80;
            text-align: center;
            min-height: 120px;
            position: relative;
            overflow: hidden;
        }

        #broadcast::before {
            content: 'NOW BROADCASTING';
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 0.55rem;
            letter-spacing: 2px;
            color: #22d3ee30;
        }

        #broadcast-text {
            transition: opacity 0.5s;
        }

        .wave-canvas {
            z-index: 1;
        }

        .footer-note {
            font-size: 0.58rem;
            color: #22d3ee25;
            letter-spacing: 2px;
            z-index: 1;
            text-align: center;
            line-height: 2;
        }

        a.back {
            color: #22d3ee30;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            transition: 0.3s;
            z-index: 1;
        }

        a.back:hover {
            color: #22d3ee;
        }

        .on-air {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.65rem;
            letter-spacing: 3px;
            z-index: 1;
        }

        .on-air-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
            animation: onair 1s infinite;
        }

        @keyframes onair {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }
    </style>
</head>

<body>
    <div class="static-bg"></div>
    <a class="back" href="index.html">← back to the real world</a>
    <div class="station-id">WWG PIRATE RADIO // UNAUTHORIZED BROADCAST CHANNEL</div>
    <div class="freq">103.7 FM</div>
    <div class="on-air">
        <div class="on-air-dot"></div> ON AIR
    </div>
    <canvas class="wave-canvas" id="wave" width="400" height="60"></canvas>
    <div class="vu" id="vu-meter"></div>
    <div id="broadcast">
        <div id="broadcast-text">TUNING IN...</div>
    </div>
    <div class="footer-note">
        TRANSMITTER LOCATION: UNKNOWN<br>
        BROADCAST LICENSE: NONE<br>
        WE'VE BEEN ON AIR SINCE 1983 // NO ONE NOTICED UNTIL NOW
    </div>

    <script>
        // VU Meter
        const vu = document.getElementById('vu-meter');
        for (let i = 0; i < 24; i++) {
            const bar = document.createElement('div');
            bar.className = 'vu-bar';
            const h = 20 + Math.random() * 80;
            bar.style.setProperty('--h', h + '%');
            bar.style.animationDuration = (0.3 + Math.random() * 0.7) + 's';
            bar.style.animationDelay = (-Math.random()) + 's';
            const pct = i / 24;
            bar.style.background = pct < 0.6 ? '#22d3ee60' : pct < 0.85 ? '#fbbf2460' : '#ef444460';
            vu.appendChild(bar);
        }

        // Wave canvas
        const wc = document.getElementById('wave');
        const wctx = wc.getContext('2d');
        let wt = 0;
        function drawWave() {
            wctx.clearRect(0, 0, 400, 60);
            wctx.strokeStyle = '#22d3ee';
            wctx.lineWidth = 1.5;
            wctx.shadowColor = '#22d3ee';
            wctx.shadowBlur = 6;
            wctx.beginPath();
            for (let x = 0; x < 400; x++) {
                const noise = (Math.random() - 0.5) * 8;
                const y = 30 + Math.sin(x * 0.04 + wt) * 12 + Math.sin(x * 0.09 + wt * 1.3) * 6 + noise;
                x === 0 ? wctx.moveTo(x, y) : wctx.lineTo(x, y);
            }
            wctx.stroke();
            wt += 0.05;
            requestAnimationFrame(drawWave);
        }
        drawWave();

        // Broadcast messages rotate slowly
        const BROADCASTS = [
            '"The map is not the territory. The signal is not the sound. You found us, and we\'ve always known you would."',
            '"If you\'re hearing this, the others can\'t. That makes you different. We don\'t know if that\'s good."',
            '"NEWS FLASH: THE VOID IS FINE. ENTITY E-1983 SENDS REGARDS. THE CLASSIFIED FILE HAS BEEN READ."',
            '"This station has been broadcasting since before you were born. We\'ll be broadcasting after."',
            '"TONIGHT\'S WEATHER: Dark. Persistently dark. With a chance of understanding something you\'ve been avoiding."',
            '"We play only one song here. You can\'t hear it. But you feel it."',
            '"CALLER FROM THE MAZE: They say they found a door that wasn\'t there before. We believe them."',
            '"TRANSMISSION 1983: the ghost said something tonight. We couldn\'t make it out. It sounded like your name."',
            '"This is an unauthorized broadcast. No one is authorized to tell you the truth. We do it anyway."',
            '"The gallery has three doors that don\'t show on any map. You\'ve found all of them now. There\'s one more."',
        ];

        let bi = Math.floor(Math.random() * BROADCASTS.length);
        const btEl = document.getElementById('broadcast-text');

        function rotateBroadcast() {
            btEl.style.opacity = '0';
            setTimeout(() => {
                bi = (bi + 1) % BROADCASTS.length;
                btEl.textContent = BROADCASTS[bi];
                btEl.style.opacity = '1';
            }, 500);
        }

        btEl.textContent = BROADCASTS[bi];
        setInterval(rotateBroadcast, 8000);
    </script>
</body>

</html>
