<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWG Discovery Guide | The 20 Fragments</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050510;
            --accent: #a78bfa;
            --zinc: #18181b;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 80px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
            max-width: 800px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .desc {
            color: #a1a1aa;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1400px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            transition: 0.4s;
            position: relative;
            opacity: 0.6;
        }

        .card.found {
            opacity: 1;
            border-color: var(--accent);
            background: rgba(167, 139, 250, 0.05);
        }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            margin-bottom: 10px;
        }

        .found .tag {
            color: var(--accent);
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #444;
        }

        .found .name {
            color: #fff;
        }

        .hint {
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #666;
        }

        .found .hint {
            color: #aaa;
            background: rgba(0, 0, 0, 0.2);
        }

        .status {
            margin-top: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .status.unfound {
            color: #444;
        }

        .status.found-text {
            color: var(--accent);
        }

        .back-link {
            position: fixed;
            top: 40px;
            left: 40px;
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← RETURN</a>

    <div class="header">
        <h1>DISCOVERY GUIDE</h1>
        <p class="desc">There are 25 core fragments hidden within this gallery. Use the hints below to salvage them for
            your Vault.</p>
    </div>

    <div class="grid" id="guide-grid">
        <!-- Generated by JS -->
    </div>

    <script src="discovery.js"></script>
    <script>
        if (!Discovery.isCheatsheetUnlocked()) {
            window.location.href = 'index.html';
        }

        const secrets = [
            { id: 'void', name: 'The Void', hint: 'Stand perfectly still for 30 seconds. Do not blink (or move the mouse).' },
            { id: 'ghost', name: 'The Ghost', hint: 'Type the greeting "HELLO" anywhere on the main page.' },
            { id: 'classified', name: 'Classified Records', hint: 'Audit the creator. Click the footer symbol three times.' },
            { id: 'backrooms', name: 'The Backrooms', hint: 'Exhaust the search bar. Type "backrooms" to fall through.' },
            { id: 'limbo', name: 'Dep. of Waiting', hint: 'Wait is a keyword. Type "limbo" in the search bar.' },
            { id: 'static', name: '103.7 Broadcast', hint: 'The airwaves are "static". Search for the signal.' },
            { id: 'deep', name: 'The Deep', hint: 'Go down, "deep" down into the search bar.' },
            { id: 'underground', name: 'The Underground', hint: 'The bar below knows the "underground" well.' },
            { id: 'starlight', name: 'Starlight', hint: 'A sky-high search for "starlight" reveals the maps.' },
            { id: 'eclipse', name: 'Solar Eclipse', hint: 'When the search bar goes dark, look for the "eclipse".' },
            { id: 'mirror', name: 'Broken Mirror', hint: 'Click the WWG logo five times to see your reflection.' },
            { id: 'blackhole', name: 'Black Hole', hint: 'Gravity pulls the "blackhole" into the search query.' },
            { id: 'chosen', name: 'The Chosen', hint: 'Search for "chosen" to see if you are the one.' },
            { id: 'useful', name: 'Useful Button', hint: 'Find the "useful" query in the search bar.' },
            { id: 'corner', name: 'DVD Secret', hint: 'Wait for the "corner" hit in the search bar.' },
            { id: 'braille', name: 'Braille Labs', hint: 'Translate the "braille" via the search bar.' },
            { id: 'glitch', name: 'Nexus Corrupt', hint: 'Feed the "glitch" to the search engine.' },
            { id: 'voidvoid', name: 'Void Matrix', hint: 'A double void? Search for "glitchvoid".' },
            { id: 'terminal', name: 'System Terminal', hint: 'Type "cmd" or "root" anywhere on the main page.' },
            { id: 'blueprint', name: 'Blueprint', hint: 'Inspect the version number in the footer. Click it three times.' },
            { id: 'zenith', name: 'Zenith Sanctuary', hint: 'The ultimate peace is found via "zenith" search.' },
            { id: 'gravity', name: 'G-Shift', hint: 'Flipping perspective is key. Search for "gravityshift".' },
            { id: 'timeloop', name: 'Time Loop', hint: 'Repeat history until it breaks. Search for "timeloop".' },
            { id: 'forest', name: 'Fractal Forest', hint: 'Discover the digital growth. Search for "binaryforest".' },
            { id: 'observer', name: 'The Observer', hint: 'Something is watching. Search for "observer".' }
        ];

        function render() {
            const discovered = Discovery.getDiscovered();
            const grid = document.getElementById('guide-grid');
            grid.innerHTML = '';

            secrets.forEach(s => {
                const isFound = discovered.includes(s.id);
                const card = document.createElement('div');
                card.className = `card ${isFound ? 'found' : ''}`;
                card.innerHTML = `
                    <div class="tag">Fragment ID: ${s.id.toUpperCase()}</div>
                    <div class="name">${isFound ? s.name : 'HIDDEN_FRAGMENT'}</div>
                    <div class="hint">${s.hint}</div>
                    <div class="status ${isFound ? 'found-text' : 'unfound'}">
                        ${isFound ? '✓ SALVAGED' : '👀 MISSING'}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        render();
    </script>
</body>

</html>
