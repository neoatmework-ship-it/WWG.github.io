<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWG Discovery Guide | The 20 Fragments</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050510;
            --accent: #a78bfa;
            --zinc: #18181b;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 80px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
            max-width: 800px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .desc {
            color: #a1a1aa;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1400px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            transition: 0.4s;
            position: relative;
            opacity: 0.6;
        }

        .card.found {
            opacity: 1;
            border-color: var(--accent);
            background: rgba(167, 139, 250, 0.05);
        }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            margin-bottom: 10px;
        }

        .found .tag {
            color: var(--accent);
        }

        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #444;
        }

        .found .name {
            color: #fff;
        }

        .hint {
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #666;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .found .hint {
            color: #aaa;
            background: rgba(0, 0, 0, 0.2);
        }

        .hint b {
            color: var(--accent);
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 2px;
        }

        .hint-block {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status {
            margin-top: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .status.unfound {
            color: #444;
        }

        .status.found-text {
            color: var(--accent);
        }

        .back-link {
            position: fixed;
            top: 40px;
            left: 40px;
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-link">← RETURN</a>

    <div class="header">
        <h1>DISCOVERY GUIDE</h1>
        <p class="desc">There are 25 core fragments hidden within this gallery. Use the hints below to salvage them for
            your Vault.</p>
    </div>

    <div class="grid" id="guide-grid">
        <!-- Generated by JS -->
    </div>

    <script src="discovery.js"></script>
    <script>
        if (!Discovery.isCheatsheetUnlocked()) {
            window.location.href = 'index.html';
        }

        const secrets = [
            { id: 'void', name: 'The Void', keyword: 'void', action: 'Remain perfectly still for 30 seconds (no mouse/key movement).' },
            { id: 'ghost', name: 'The Ghost', keyword: 'ghost', action: 'Type the greeting "HELLO" anywhere on the main page.' },
            { id: 'classified', name: 'Classified Records', keyword: 'classified', action: 'Triple-click the ✦ symbol in the footer.' },
            { id: 'backrooms', name: 'The Backrooms', keyword: 'backrooms', action: 'Click the dark background area of the footer 5 times.' },
            { id: 'limbo', name: 'Dep. of Waiting', keyword: 'limbo', action: 'Search for anything, and stay on the "No Results" page for 20 seconds.' },
            { id: 'static', name: '103.7 Broadcast', keyword: 'static', action: 'Rapidly focus the search bar 5 times within 2 seconds.' },
            { id: 'deep', name: 'The Deep', keyword: 'deep', action: 'Double-click the blue "Scroll to Top" button.' },
            { id: 'underground', name: 'The Underground', keyword: 'underground', action: 'Triple-click the "Suggest Idea" bulb button.' },
            { id: 'starlight', name: 'Starlight Observatory', keyword: 'starlight', action: 'Hold Shift and click the "WWG" title in the hero section.' },
            { id: 'eclipse', name: 'Solar Eclipse', keyword: 'eclipse', action: 'Hold Control and click the "WWG" title.' },
            { id: 'mirror', name: 'Broken Mirror', keyword: 'mirror', action: 'Click the "WWG" title 5 times rapidly.' },
            { id: 'blackhole', name: 'Black Hole', keyword: 'blackhole', action: 'Triple-click the 🔍 emoji on the "No Results" screen.' },
            { id: 'chosen', name: 'The Chosen', keyword: 'chosen', action: 'Hold Alt and click the "WWG" title.' },
            { id: 'useful', name: 'The Useful Button', keyword: 'useful', action: 'Input the classic Konami code in "Useless Button Museum".' },
            { id: 'corner', name: 'The Corner Room', keyword: 'corner', action: 'Wait for a perfect corner hit in "DVD Logo Simulator".' },
            { id: 'braille', name: 'Braille Labs', keyword: 'braille', action: 'Triple-click the braille icon on its gallery card.' },
            { id: 'glitch', name: 'Nexus Corrupt', keyword: 'glitch', action: 'Rapidly click any category tag (e.g., 🧪 Physics) 7 times.' },
            { id: 'voidvoid', name: 'The Void Matrix', keyword: 'glitchvoid', action: 'Type "void" into the search bar and press Shift + Enter.' },
            { id: 'terminal', name: 'System Terminal', keyword: 'terminal', action: 'Type "cmd" or "root" anywhere on the home page.' },
            { id: 'blueprint', name: 'Technical Blueprint', keyword: 'blueprint', action: 'Triple-click the version number (e.g. v3.x.x) in the footer.' },
            { id: 'zenith', name: 'Zenith Sanctuary', keyword: 'zenith', action: 'Triple-click the "Find my secrets" text in the hero section.' },
            { id: 'gravity', name: 'Gravity Shift', keyword: 'gravityshift', action: 'Type "flip" anywhere on the home page.' },
            { id: 'timeloop', name: 'The Time Loop', keyword: 'timeloop', action: 'Rapidly alternate clicking Prev-Next-Prev-Next-Prev-Next in page navigation.' },
            { id: 'forest', name: 'The Binary Forest', keyword: 'binaryforest', action: 'Type "tree" anywhere on the home page.' },
            { id: 'observer', name: 'The Observer', keyword: 'observer', action: 'Type "eye" anywhere on the home page.' }
        ];

        function render() {
            const discovered = Discovery.getDiscovered();
            const grid = document.getElementById('guide-grid');
            grid.innerHTML = '';

            secrets.forEach(s => {
                const isFound = discovered.includes(s.id);
                const card = document.createElement('div');
                card.className = `card ${isFound ? 'found' : ''}`;
                card.innerHTML = `
                    <div class="tag">Fragment ID: ${s.id.toUpperCase()}</div>
                    <div class="name">${isFound ? s.name : 'HIDDEN_FRAGMENT'}</div>
                    <div class="hint">
                        <div class="hint-block"><b>Access via Keyword</b> Search for: "${s.keyword}"</div>
                        <div class="hint-block"><b>Access via Action</b> ${s.action}</div>
                    </div>
                    <div class="status ${isFound ? 'found-text' : 'unfound'}">
                        ${isFound ? '✓ SALVAGED' : '👀 MISSING'}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        render();
    </script>
</body>

</html>
